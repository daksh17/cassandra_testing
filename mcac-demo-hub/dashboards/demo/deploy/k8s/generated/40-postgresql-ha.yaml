apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgresql-primary
  namespace: demo-hub
  labels:
    app.kubernetes.io/name: postgresql-primary
    app.kubernetes.io/part-of: demo-hub
    demo-hub.io/group: postgres-ha
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgresql-primary
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgresql-primary
        app.kubernetes.io/part-of: demo-hub
        demo-hub.io/group: postgres-ha
    spec:
      initContainers:
        - name: assert-repmgr-extension
          image: mcac-demo/postgresql-repmgr:16.6.0
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              set -e
              for f in \
                /opt/bitnami/postgresql/share/extension/repmgr.control \
                /opt/bitnami/postgresql/share/extension/pg_profile.control; do
                if [ ! -f "$f" ]; then
                  echo "Missing $f in image mcac-demo/postgresql-repmgr:16.6.0." >&2
                  echo "Rebuild: docker build --no-cache -t mcac-demo/postgresql-repmgr:16.6.0 -f deploy/docker/postgres-kafka/Dockerfile.repmgr deploy/docker/postgres-kafka" >&2
                  exit 1
                fi
              done
        - name: mcac-wal-archive-conf
          image: mcac-demo/postgresql-repmgr:16.6.0
          imagePullPolicy: IfNotPresent
          env:
            - name: MCAC_ARCHIVE_MODE
              value: "on"
          command:
            - sh
            - -c
            - |
              set -e
              conf_dir=/bitnami/postgresql/conf/conf.d
              mkdir -p "$conf_dir"
              printf '%s\n' "cron.host = ''" > "$conf_dir/98-mcac-cron-host.conf"
              printf '%s\n' "archive_mode = ${MCAC_ARCHIVE_MODE}" \
                "archive_command = '/opt/bitnami/scripts/mcac-wal-archive.sh %p %f'" \
                > "$conf_dir/99-mcac-archive.conf"
          volumeMounts:
            - name: data
              mountPath: /bitnami/postgresql
        - name: mcac-pghba-local-demo
          image: mcac-demo/postgresql-repmgr:16.6.0
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              set -e
              if [ -f /docker-entrypoint-initdb.d/07-pg_hba-local-demo-postgres-trust.sh ]; then
                /docker-entrypoint-initdb.d/07-pg_hba-local-demo-postgres-trust.sh
              fi
          volumeMounts:
            - name: data
              mountPath: /bitnami/postgresql
      containers:
        - name: postgresql-primary
          image: mcac-demo/postgresql-repmgr:16.6.0
          imagePullPolicy: IfNotPresent
          env:
            - name: POSTGRESQL_REPLICATION_MODE
              value: "master"
            - name: POSTGRESQL_REPLICATION_USER
              value: "replicator"
            - name: POSTGRESQL_USERNAME
              value: "postgres"
            - name: POSTGRESQL_DATABASE
              value: "demo"
            - name: POSTGRESQL_SHARED_PRELOAD_LIBRARIES
              value: "repmgr,pgaudit,pg_stat_statements,pg_cron"
            - name: POSTGRESQL_EXTRA_FLAGS
              value: "-c wal_level=logical -c max_replication_slots=8 -c max_wal_senders=8 -c pg_stat_statements.max=10000 -c pg_stat_statements.track=all -c cron.database_name=postgres -c track_io_timing=on -c track_functions=all"
            - name: POSTGRESQL_REPLICATION_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: demo-hub-credentials
                  key: postgresql-replication-password
            - name: POSTGRESQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: demo-hub-credentials
                  key: postgresql-password
          volumeMounts:
            - name: data
              mountPath: /bitnami/postgresql
          lifecycle:
            postStart:
              exec:
                command:
                  - /bin/bash
                  - -lc
                  - "set +e; for i in $(seq 1 90); do if [ -f /opt/bitnami/postgresql/conf/pg_hba.conf ] || [ -f /bitnami/postgresql/conf/pg_hba.conf ] || [ -f /bitnami/postgresql/data/pg_hba.conf ]; then /docker-entrypoint-initdb.d/07-pg_hba-local-demo-postgres-trust.sh; D=\"${PGDATA:-/bitnami/postgresql/data}\"; if /opt/bitnami/postgresql/bin/pg_ctl -D \"$D\" reload -s 2>/dev/null; then exit 0; fi; fi; sleep 1; done; exit 0"
          ports:
            - containerPort: 5432
              name: pg
      volumes:
        - name: data
          emptyDir: {}
---

apiVersion: v1
kind: Service
metadata:
  name: postgresql-primary
  namespace: demo-hub
  labels:
    app.kubernetes.io/name: postgresql-primary
    app.kubernetes.io/part-of: demo-hub
    demo-hub.io/group: postgres-ha
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: postgresql-primary
  ports:
    - port: 5432
      targetPort: 5432
      name: pg
---

