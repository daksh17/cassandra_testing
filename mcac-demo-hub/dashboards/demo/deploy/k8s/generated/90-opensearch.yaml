apiVersion: v1
kind: ConfigMap
metadata:
  name: opensearch-config
  namespace: demo-hub
  labels:
    demo-hub.io/group: opensearch
data:
  opensearch.yml: |
    cluster.name: demo-hub
    network.host: 0.0.0.0
    discovery.type: single-node
    plugins.security.disabled: true
    cluster.routing.allocation.disk.threshold_enabled: false
---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: opensearch
  namespace: demo-hub
  labels:
    demo-hub.io/group: opensearch
    app.kubernetes.io/name: opensearch
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: opensearch
  template:
    metadata:
      labels:
        app.kubernetes.io/name: opensearch
        demo-hub.io/group: opensearch
    spec:
      containers:
        - name: opensearch
          image: opensearchproject/opensearch:2.11.1
          imagePullPolicy: IfNotPresent
          env:
            - name: OPENSEARCH_JAVA_OPTS
              value: "-Xms512m -Xmx512m -XX:MaxDirectMemorySize=256m"
            - name: DISABLE_SECURITY_PLUGIN
              value: "true"
            - name: DISABLE_INSTALL_DEMO_CONFIG
              value: "true"
          volumeMounts:
            - name: config
              mountPath: /usr/share/opensearch/config/opensearch.yml
              subPath: opensearch.yml
            - name: data
              mountPath: /usr/share/opensearch/data
          ports:
            - containerPort: 9200
              name: http
            - containerPort: 9600
              name: metrics
      volumes:
        - name: config
          configMap:
            name: opensearch-config
        - name: data
          emptyDir: {}
---

apiVersion: v1
kind: Service
metadata:
  name: opensearch
  namespace: demo-hub
  labels:
    app.kubernetes.io/name: opensearch
    demo-hub.io/group: opensearch
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: opensearch
  ports:
    - port: 9200
      name: http
      targetPort: 9200
    - port: 9600
      name: metrics
      targetPort: 9600
---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: opensearch-dashboards
  namespace: demo-hub
  labels:
    app.kubernetes.io/name: opensearch-dashboards
    app.kubernetes.io/part-of: demo-hub
    demo-hub.io/group: opensearch
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: opensearch-dashboards
  template:
    metadata:
      labels:
        app.kubernetes.io/name: opensearch-dashboards
        app.kubernetes.io/part-of: demo-hub
        demo-hub.io/group: opensearch
    spec:
      containers:
        - name: opensearch-dashboards
          image: opensearchproject/opensearch-dashboards:2.11.1
          imagePullPolicy: IfNotPresent
          env:
            - name: OPENSEARCH_HOSTS
              value: "[\"http://opensearch:9200\"]"
            - name: DISABLE_SECURITY_DASHBOARDS_PLUGIN
              value: "true"
          ports:
            - containerPort: 5601
              name: http
---

apiVersion: v1
kind: Service
metadata:
  name: opensearch-dashboards
  namespace: demo-hub
  labels:
    app.kubernetes.io/name: opensearch-dashboards
    app.kubernetes.io/part-of: demo-hub
    demo-hub.io/group: opensearch
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: opensearch-dashboards
  ports:
    - port: 5601
      targetPort: 5601
      name: http
---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: opensearch-exporter
  namespace: demo-hub
  labels:
    app.kubernetes.io/name: opensearch-exporter
    app.kubernetes.io/part-of: demo-hub
    demo-hub.io/group: opensearch
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: opensearch-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: opensearch-exporter
        app.kubernetes.io/part-of: demo-hub
        demo-hub.io/group: opensearch
    spec:
      containers:
        - name: opensearch-exporter
          image: quay.io/prometheuscommunity/elasticsearch-exporter:v1.7.0
          imagePullPolicy: IfNotPresent
          args:
            - "--es.uri=http://opensearch:9200"
            - "--es.all"
            - "--es.indices"
            - "--es.timeout=30s"
          ports:
            - containerPort: 9114
              name: metrics
---

apiVersion: v1
kind: Service
metadata:
  name: opensearch-exporter
  namespace: demo-hub
  labels:
    app.kubernetes.io/name: opensearch-exporter
    app.kubernetes.io/part-of: demo-hub
    demo-hub.io/group: opensearch
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: opensearch-exporter
  ports:
    - port: 9114
      targetPort: 9114
      name: metrics
