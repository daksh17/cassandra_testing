apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault
  namespace: demo-hub
  labels:
    app.kubernetes.io/name: vault
    app.kubernetes.io/part-of: demo-hub
    demo-hub.io/group: vault
---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: vault
  namespace: demo-hub
  labels:
    app.kubernetes.io/name: vault
    app.kubernetes.io/part-of: demo-hub
    demo-hub.io/group: vault
spec:
  replicas: 1
  selector:
    matchLabels:
        app.kubernetes.io/name: vault
        app.kubernetes.io/part-of: demo-hub
        demo-hub.io/group: vault
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vault
        app.kubernetes.io/part-of: demo-hub
        demo-hub.io/group: vault
    spec:
      serviceAccountName: vault
      containers:
        - name: vault
          image: hashicorp/vault:1.15.6
          imagePullPolicy: IfNotPresent
          args:
            - server
            - -dev
            - -dev-listen-address=0.0.0.0:8200
            - -dev-root-token-id=demo-hub-dev-root
          env:
            - name: VAULT_API_ADDR
              value: "http://0.0.0.0:8200"
          ports:
            - name: http
              containerPort: 8200
          securityContext:
            capabilities:
              add:
                - IPC_LOCK
          readinessProbe:
            httpGet:
              path: /v1/sys/health
              port: http
              scheme: HTTP
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /v1/sys/health
              port: http
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 15
---

apiVersion: v1
kind: Service
metadata:
  name: vault
  namespace: demo-hub
  labels:
    app.kubernetes.io/name: vault
    app.kubernetes.io/part-of: demo-hub
    demo-hub.io/group: vault
spec:
  type: ClusterIP
  selector:
        app.kubernetes.io/name: vault
        app.kubernetes.io/part-of: demo-hub
        demo-hub.io/group: vault
  ports:
    - name: http
      port: 8200
      targetPort: http
---

apiVersion: batch/v1
kind: Job
metadata:
  name: vault-demo-hub-seed
  namespace: demo-hub
  labels:
    app.kubernetes.io/name: vault
    app.kubernetes.io/part-of: demo-hub
    demo-hub.io/group: vault
spec:
  ttlSecondsAfterFinished: 86400
  backoffLimit: 8
  activeDeadlineSeconds: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vault
        app.kubernetes.io/part-of: demo-hub
        demo-hub.io/group: vault
    spec:
      restartPolicy: Never
      initContainers:
        - name: wait-vault
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              for i in $(seq 1 90); do
                if wget -q -O- http://vault.demo-hub.svc.cluster.local:8200/v1/sys/health >/dev/null 2>&1; then
                  exit 0
                fi
                sleep 2
              done
              echo "timeout waiting for Vault" >&2
              exit 1
      containers:
        - name: seed
          image: hashicorp/vault:1.15.6
          imagePullPolicy: IfNotPresent
          env:
            - name: VAULT_ADDR
              value: "http://vault.demo-hub.svc.cluster.local:8200"
            - name: VAULT_TOKEN
              value: "demo-hub-dev-root"
          command:
            - /bin/sh
            - -c
            - |
              set -eux
              export VAULT_ADDR=http://vault.demo-hub.svc.cluster.local:8200
              export VAULT_TOKEN=demo-hub-dev-root
              vault kv put secret/demo-hub/credentials \
                          postgresql-password=postgres \
                          postgresql-replication-password=replicatorpass \
                          redis-password=demoredispass \
                          demo-user-password=demopass \
                          hub-postgres-dsn=postgresql://demo:demopass@postgresql-primary:5432/demo \
                          hub-redis-url=redis://:demoredispass@redis:6379/0
              vault kv put secret/demo-hub/kafka-connect/pg-source \
                          database.hostname=postgresql-primary \
                          database.port=5432 \
                          database.user=replicator \
                          database.password=replicatorpass \
                          database.dbname=demo
              vault kv put secret/demo-hub/kafka-connect/jdbc-sink \
                          connection.url=jdbc:postgresql://postgresql-primary:5432/demo \
                          connection.username=demo \
                          connection.password=demopass
              vault kv put secret/demo-hub/kafka-connect/mongo-source \
                          mongodb.connection.string=mongodb://mongo-mongos1:27017
              vault kv put secret/demo-hub/kafka-connect/mongo-sink \
                          connection.uri=mongodb://mongo-mongos1:27017 \
                          database=demo \
                          collection=demo_items_from_kafka
              echo "Vault KV seed complete."
