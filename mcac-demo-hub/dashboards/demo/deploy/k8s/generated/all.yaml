apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-exporter-mcac
  namespace: demo-hub
  labels:
    app.kubernetes.io/name: kafka-exporter-mcac
    app.kubernetes.io/part-of: demo-hub
    demo-hub.io/group: exporters
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: kafka-exporter-mcac
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kafka-exporter-mcac
        app.kubernetes.io/part-of: demo-hub
        demo-hub.io/group: exporters
    spec:
      initContainers:
        - name: wait-kafka
          image: alpine:3.19
          command:
            - /bin/sh
            - -c
            - |
              apk add --no-cache netcat-openbsd >/dev/null
              for i in $(seq 1 150); do
                if nc -z -w 2 kafka.demo-hub.svc.cluster.local 9092 2>/dev/null; then exit 0; fi
                sleep 2
              done
              echo "timeout waiting for kafka.demo-hub.svc.cluster.local:9092" >&2
              exit 1
      containers:
