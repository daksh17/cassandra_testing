apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: cassandra
  namespace: demo-hub
  labels:
    demo-hub.io/group: cassandra-ring
    app.kubernetes.io/name: cassandra
spec:
  serviceName: cassandra-headless
  replicas: 3
  podManagementPolicy: OrderedReady
  selector:
    matchLabels:
      app.kubernetes.io/name: cassandra
      demo-hub.io/cassandra-workload: statefulset
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cassandra
        app.kubernetes.io/part-of: demo-hub
        demo-hub.io/group: cassandra-ring
        demo-hub.io/cassandra-workload: statefulset
    spec:
      initContainers:
        - name: mcac-copy-agent
          image: mcac-demo/mcac-init:local
          imagePullPolicy: Never
          command:
            - sh
            - -c
            - mkdir -p /mcac/lib && cp -r /agent/lib/. /mcac/lib/
          volumeMounts:
            - name: mcac-agent
              mountPath: /mcac
      containers:
        - name: cassandra
          image: cassandra:4.0
          imagePullPolicy: IfNotPresent
          env:
            - name: MAX_HEAP_SIZE
              value: "500M"
            - name: HEAP_NEWSIZE
              value: "100M"
            - name: LOCAL_JMX
              value: "no"
            - name: JVM_EXTRA_OPTS
              value: "-javaagent:/mcac/lib/datastax-mcac-agent-0.3.3.jar -Dcassandra.consistent.rangemovement=false -Dcassandra.ring_delay_ms=100 -Dcassandra.jmx.remote.authenticate=false -Dcom.sun.management.jmxremote.authenticate=false -Dcom.sun.management.jmxremote.ssl=false"
            - name: CASSANDRA_NUM_TOKENS
              value: "8"
            - name: CASSANDRA_SEEDS
              value: "cassandra-0.cassandra-headless.demo-hub.svc.cluster.local"
          resources:
            requests:
              memory: "1536Mi"
            limits:
              memory: "3Gi"
          ports:
            - containerPort: 9042
              name: cql
            - containerPort: 7000
              name: intra
            - containerPort: 9103
              name: jmx
            - containerPort: 9501
              name: mcac
          volumeMounts:
            - name: data
              mountPath: /var/lib/cassandra
            - name: mcac-agent
              mountPath: /mcac
            - name: mcac-config
              mountPath: /mcac/config
              readOnly: true
      volumes:
        - name: mcac-agent
          emptyDir: {}
        - name: mcac-config
          configMap:
            name: mcac-agent-config
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          app.kubernetes.io/name: cassandra
          demo-hub.io/group: cassandra-ring
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: "10Gi"
---

apiVersion: v1
kind: ConfigMap
metadata:
  name: cassandra-schema-sql
  namespace: demo-hub
  labels:
    demo-hub.io/group: cassandra-ring
    app.kubernetes.io/part-of: demo-hub
data:
  schema.cql: |
    CREATE KEYSPACE IF NOT EXISTS demo_hub
      WITH replication = {'class': 'SimpleStrategy', 'replication_factor': 3};
    
    -- Minimal table for hub path checks (scenario may add more)
    CREATE TABLE IF NOT EXISTS demo_hub.hub_orders_placeholder (
      id uuid PRIMARY KEY,
      created_at timestamp
    );

  bootstrap.sh: |
    #!/usr/bin/env bash
    set -euo pipefail
    CQL_HOST="cassandra-0.cassandra-headless.demo-hub.svc.cluster.local"
    for i in $(seq 1 120); do
      if cqlsh "$CQL_HOST" 9042 -e "DESCRIBE KEYSPACES" >/dev/null 2>&1; then
        break
      fi
      sleep 3
    done
    exec cqlsh "$CQL_HOST" 9042 -f /scripts/schema.cql
---

