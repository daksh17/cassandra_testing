apiVersion: apps/v1
kind: Deployment
metadata:
  name: hub-demo-ui
  namespace: demo-hub
  labels:
    app.kubernetes.io/name: hub-demo-ui
    app.kubernetes.io/part-of: demo-hub
    demo-hub.io/group: hub-demo-ui
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: hub-demo-ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hub-demo-ui
        app.kubernetes.io/part-of: demo-hub
        demo-hub.io/group: hub-demo-ui
    spec:
      initContainers:
        - name: wait-hub-deps
          image: alpine:3.19
          command:
            - /bin/sh
            - -c
            - |
              apk add --no-cache netcat-openbsd >/dev/null
              p() { nc -z -w 3 "$1" "$2" 2>/dev/null && echo OK || echo FAIL; }
              for i in $(seq 1 200); do
                if nc -z -w 3 kafka.demo-hub.svc.cluster.local 9092 2>/dev/null \
                  && nc -z -w 3 opensearch.demo-hub.svc.cluster.local 9200 2>/dev/null \
                  && nc -z -w 3 postgresql-primary.demo-hub.svc.cluster.local 5432 2>/dev/null \
                  && nc -z -w 3 cassandra-0.cassandra-headless.demo-hub.svc.cluster.local 9042 2>/dev/null \
                  && nc -z -w 3 redis.demo-hub.svc.cluster.local 6379 2>/dev/null; then
                  echo "wait-hub-deps: all upstream TCP checks OK (attempt $i)" >&2
                  exit 0
                fi
                if [ $((i % 15)) -eq 0 ]; then
                  echo "wait-hub-deps: attempt $i/200 — kafka:9092=$(p kafka.demo-hub.svc.cluster.local 9092) opensearch:9200=$(p opensearch.demo-hub.svc.cluster.local 9200) postgres:5432=$(p postgresql-primary.demo-hub.svc.cluster.local 5432) cassandra-0:9042=$(p cassandra-0.cassandra-headless.demo-hub.svc.cluster.local 9042) redis:6379=$(p redis.demo-hub.svc.cluster.local 6379) (mongos not gated)" >&2
                fi
                sleep 2
              done
              echo "timeout waiting for kafka:9092, opensearch:9200, postgresql-primary:5432," >&2
              echo "  cassandra-0:9042 (headless), redis:6379" >&2
              exit 1
      containers:
        - name: hub-demo-ui
          image: mcac-demo/hub-demo-ui:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: MONGO_URI
              value: "mongodb://mongo-mongos1:27017"
            - name: CASSANDRA_HOSTS
              value: "cassandra-0.cassandra-headless.demo-hub.svc.cluster.local,cassandra-1.cassandra-headless.demo-hub.svc.cluster.local,cassandra-2.cassandra-headless.demo-hub.svc.cluster.local"
            - name: CASSANDRA_KEYSPACE
              value: "demo_hub"
            - name: OPENSEARCH_URL
              value: "http://opensearch:9200"
            - name: OPENSEARCH_INDEX
              value: "hub-orders"
            - name: KAFKA_BOOTSTRAP
              value: "kafka:9092"
            - name: CASSANDRA_WORKLOAD_REQUEST_TIMEOUT_SECONDS
              value: "300"
            - name: CASSANDRA_WORKLOAD_INTER_BATCH_SLEEP_MS
              value: "25"
            - name: CASSANDRA_WORKLOAD_WRITE_RETRIES
              value: "3"
            - name: POSTGRES_DSN
              valueFrom:
                secretKeyRef:
                  name: demo-hub-credentials
                  key: hub-postgres-dsn
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: demo-hub-credentials
                  key: hub-redis-url
          ports:
            - containerPort: 8888
              name: http
---

