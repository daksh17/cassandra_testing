apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: demo-hub
  labels:
    demo-hub.io/group: observability
    app.kubernetes.io/name: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: grafana
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grafana
        demo-hub.io/group: observability
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.4.0
          imagePullPolicy: IfNotPresent
          env:
            - name: GF_INSTALL_PLUGINS
              value: grafana-polystat-panel
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: Admin
          volumeMounts:
            - name: grafana-ds
              mountPath: /etc/grafana/provisioning/datasources/prometheus-datasource.yaml
              subPath: prometheus-datasource.yaml
            - name: grafana-dash-prov
              mountPath: /etc/grafana/provisioning/dashboards/dashboards.yaml
              subPath: dashboards.yaml
            - name: grafana-dash-json
              mountPath: /var/lib/grafana/dashboards
          ports:
            - containerPort: 3000
              name: http
      volumes:
        - name: grafana-ds
          configMap:
            name: grafana-datasources
        - name: grafana-dash-prov
          configMap:
            name: grafana-dashboard-provider
        - name: grafana-dash-json
          projected:
            defaultMode: 420
            sources:
              - configMap:
                  name: grafana-db-cassandra-condensed-json
                  items:
                    - key: "cassandra-condensed.json"
                      path: "cassandra-condensed.json"
              - configMap:
                  name: grafana-db-kafka-cluster-overview-json
                  items:
                    - key: "kafka-cluster-overview.json"
                      path: "kafka-cluster-overview.json"
              - configMap:
                  name: grafana-db-mongodb-tictactoe-detailed-json
                  items:
                    - key: "mongodb-tictactoe-detailed.json"
                      path: "mongodb-tictactoe-detailed.json"
              - configMap:
                  name: grafana-db-opensearch-demo-overview-json
                  items:
                    - key: "opensearch-demo-overview.json"
                      path: "opensearch-demo-overview.json"
              - configMap:
                  name: grafana-db-overview-json
                  items:
                    - key: "overview.json"
                      path: "overview.json"
              - configMap:
                  name: grafana-db-postgres-database-json
                  items:
                    - key: "postgres-database.json"
                      path: "postgres-database.json"
              - configMap:
                  name: grafana-db-redis-demo-overview-json
                  items:
                    - key: "redis-demo-overview.json"
                      path: "redis-demo-overview.json"
              - configMap:
                  name: grafana-db-system-metrics-json
                  items:
                    - key: "system-metrics.json"
                      path: "system-metrics.json"
---

apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: demo-hub
  labels:
    app.kubernetes.io/name: grafana
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: grafana
  ports:
    - port: 3000
      targetPort: 3000
      name: http
---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: zookeeper
  namespace: demo-hub
  labels:
    app.kubernetes.io/name: zookeeper
    app.kubernetes.io/part-of: demo-hub
    demo-hub.io/group: kafka
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: zookeeper
  template:
    metadata:
      labels:
        app.kubernetes.io/name: zookeeper
        app.kubernetes.io/part-of: demo-hub
        demo-hub.io/group: kafka
    spec:
      securityContext:
        fsGroup: 1001
      containers:
        - name: zookeeper
          image: docker.io/bitnamilegacy/zookeeper:3.9.3-debian-12-r0
          imagePullPolicy: IfNotPresent
          env:
            - name: ZOO_PORT_NUMBER
              value: "2181"
            - name: ZOO_TICK_TIME
              value: "2000"
            - name: ALLOW_ANONYMOUS_LOGIN
              value: "yes"
            - name: ZOO_LISTEN_ALLIPS_ENABLED
              value: "yes"
          volumeMounts:
            - name: data
              mountPath: /bitnami/zookeeper
          ports:
            - containerPort: 2181
              name: client
          readinessProbe:
            tcpSocket:
              port: 2181
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 18
      volumes:
