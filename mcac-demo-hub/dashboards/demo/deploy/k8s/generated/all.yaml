apiVersion: v1
kind: Namespace
metadata:
  name: demo-hub
  labels:
    app.kubernetes.io/part-of: demo-hub
---

apiVersion: v1
kind: Secret
metadata:
  name: demo-hub-credentials
  namespace: demo-hub
  labels:
    app.kubernetes.io/part-of: demo-hub
    demo-hub.io/group: credentials
type: Opaque
stringData:
  postgresql-password: postgres
  postgresql-replication-password: replicatorpass
  redis-password: demoredispass
  demo-user-password: demopass
  hub-postgres-dsn: postgresql://demo:demopass@postgresql-primary:5432/demo
  hub-redis-url: redis://:demoredispass@redis:6379/0
---

apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: demo-hub
  labels:
    demo-hub.io/group: observability
data:
  prometheus.yaml: |
    global:
      scrape_interval: 15s
      scrape_timeout: 10s
      evaluation_interval: 15s

    alerting:
      alertmanagers:
      - static_configs:
        - targets: []
        scheme: http
        timeout: 10s

    scrape_configs:
      - job_name: prometheus
        scrape_interval: 15s
        scrape_timeout: 15s
        metrics_path: /metrics
        scheme: http
        static_configs:
        - targets:
          - localhost:9090

      # Nodetool-derived metrics (separate container). Port 9104 only — do not use 9103 (that is MCAC on each cassandra node).
      - job_name: "nodetool"
        # Exporter runs nodetool sequentially (3× per host); keep timeout above 9 × NODETOOL_TIMEOUT_SEC worst-case.
        scrape_interval: 90s
        scrape_timeout: 90s
        metrics_path: /metrics
        scheme: http
        static_configs:
          - targets:
              - nodetool-exporter:9104

      # MongoDB: 9-node sharded demo (3 cfg + 3 shards tic/tac/toe + 3 mongos) via Percona exporter on mongos1.
      - job_name: "mongodb"
        scrape_interval: 15s
        scrape_timeout: 10s
        metrics_path: /metrics
        scheme: http
        static_configs:
          - targets:
              - mongodb-exporter:9216
            labels:
              mongo_cluster: "tictactoe"
              mongo_topology: "sharded"
              mongo_exporter_target: "mongos"

      - job_name: "mcac"
        scrape_interval: 30s
        scrape_timeout:  28s
        honor_labels: true
        file_sd_configs:
          - files:
            - 'tg_mcac.json'
        metric_relabel_configs:
         #drop metrics we can calculate from prometheus directly
         - source_labels: [__name__]
           regex: .*rate_(mean|1m|5m|15m)
           action: drop
         #save the original name for all metrics
         - source_labels: [__name__]
           regex: (collectd_mcac_.+)
           target_label: prom_name
           replacement: ${1}
         - source_labels: ["prom_name"]
           regex: .+_bucket_(\d+)
           target_label: le
           replacement: ${1}
         - source_labels: ["prom_name"]
           regex: .+_bucket_inf
           target_label: le
           replacement: +Inf
         - source_labels: ["prom_name"]
           regex: .*_histogram_p(\d+)
           target_label: quantile
           replacement: .${1}
         - source_labels: ["prom_name"]
           regex: .*_histogram_min
           target_label: quantile
           replacement: "0"
         - source_labels: ["prom_name"]
           regex: .*_histogram_max
           target_label: quantile
           replacement: "1"
         #Table Metrics *ALL* we can drop
         - source_labels: ["mcac"]
           regex: org\.apache\.cassandra\.metrics\.table\.(\w+)
           action: drop
         #Table Metrics
         - source_labels: ["mcac"]
           regex: org\.apache\.cassandra\.metrics\.table\.(\w+)\.(\w+)\.(\w+)
           target_label: table
           replacement: ${3}
         - source_labels: ["mcac"]
           regex: org\.apache\.cassandra\.metrics\.table\.(\w+)\.(\w+)\.(\w+)
           target_label: keyspace
           replacement: ${2}
         - source_labels: ["mcac"]
           regex: org\.apache\.cassandra\.metrics\.table\.(\w+)\.(\w+)\.(\w+)
           target_label: __name__
           replacement: mcac_table_${1}
         #Keyspace Metrics
         - source_labels: ["mcac"]
           regex: org\.apache\.cassandra\.metrics\.keyspace\.(\w+)\.(\w+)
           target_label: keyspace
           replacement: ${2}
         - source_labels: ["mcac"]
           regex: org\.apache\.cassandra\.metrics\.keyspace\.(\w+)\.(\w+)
           target_label: __name__
           replacement: mcac_keyspace_${1}
         #ThreadPool Metrics (one type is repair.task so we just ignore the second part)
         - source_labels: ["mcac"]
           regex: org\.apache\.cassandra\.metrics\.thread_pools\.(\w+)\.(\w+)\.(\w+).*
           target_label: pool_type
           replacement: ${2}
         - source_labels: ["mcac"]
           regex: org\.apache\.cassandra\.metrics\.thread_pools\.(\w+)\.(\w+)\.(\w+).*
           target_label: pool_name
           replacement: ${3}
         - source_labels: ["mcac"]
           regex: org\.apache\.cassandra\.metrics\.thread_pools\.(\w+)\.(\w+)\.(\w+).*
           target_label: __name__
           replacement: mcac_thread_pools_${1}
         #ClientRequest Metrics
         - source_labels: ["mcac"]
           regex: org\.apache\.cassandra\.metrics\.client_request\.(\w+)\.(\w+)$
           target_label: request_type
           replacement: ${2}
         - source_labels: ["mcac"]
           regex: org\.apache\.cassandra\.metrics\.client_request\.(\w+)\.(\w+)$
           target_label: __name__
           replacement: mcac_client_request_${1}
         - source_labels: ["mcac"]
           regex: org\.apache\.cassandra\.metrics\.client_request\.(\w+)\.(\w+)\.(\w+)$
           target_label: cl
           replacement: ${3}
         - source_labels: ["mcac"]
           regex: org\.apache\.cassandra\.metrics\.client_request\.(\w+)\.(\w+)\.(\w+)$
           target_label: request_type
           replacement: ${2}
         - source_labels: ["mcac"]
           regex: org\.apache\.cassandra\.metrics\.client_request\.(\w+)\.(\w+)\.(\w+)$
           target_label: __name__
           replacement: mcac_client_request_${1}_cl
         #Cache Metrics
         - source_labels: ["mcac"]
           regex: org\.apache\.cassandra\.metrics\.cache\.(\w+)\.(\w+)
           target_label: cache_name
           replacement: ${2}
         - source_labels: ["mcac"]
           regex: org\.apache\.cassandra\.metrics\.cache\.(\w+)\.(\w+)
           target_label: __name__
           replacement: mcac_cache_${1}
         #CQL Metrics
         - source_labels: ["mcac"]
           regex: org\.apache\.cassandra\.metrics\.cql\.(\w+)
           target_label: __name__
           replacement: mcac_cql_${1}
         #Dropped Message Metrics
         - source_labels: ["mcac"]
           regex: org\.apache\.cassandra\.metrics\.dropped_message\.(\w+)\.(\w+)
           target_label: message_type
           replacement: ${2}
         - source_labels: ["mcac"]
           regex: org\.apache\.cassandra\.metrics\.dropped_message\.(\w+)\.(\w+)
           target_label: __name__
           replacement: mcac_dropped_message_${1}
         #Streaming Metrics
         - source_labels: ["mcac"]
           regex: org\.apache\.cassandra\.metrics\.streaming\.(\w+)\.(.+)$
           target_label: peer_ip
           replacement: ${2}
         - source_labels: ["mcac"]
           regex: org\.apache\.cassandra\.metrics\.streaming\.(\w+)\.(.+)$
           target_label: __name__
           replacement: mcac_streaming_${1}
         - source_labels: ["mcac"]
           regex: org\.apache\.cassandra\.metrics\.streaming\.(\w+)$
           target_label: __name__
           replacement: mcac_streaming_${1}
         #CommitLog Metrics
         - source_labels: ["mcac"]
           regex: org\.apache\.cassandra\.metrics\.commit_log\.(\w+)
           target_label: __name__
           replacement: mcac_commit_log_${1}
         #Compaction Metrics
         - source_labels: ["mcac"]
           regex: org\.apache\.cassandra\.metrics\.compaction\.(\w+)
           target_label: __name__
           replacement: mcac_compaction_${1}
         #Storage Metrics
         - source_labels: ["mcac"]
           regex: org\.apache\.cassandra\.metrics\.storage\.(\w+)
           target_label: __name__
           replacement: mcac_storage_${1}
         #Batch Metrics
         - source_labels: ["mcac"]
           regex: org\.apache\.cassandra\.metrics\.batch\.(\w+)
           target_label: __name__
           replacement: mcac_batch_${1}
         #Client Metrics
         - source_labels: ["mcac"]
           regex: org\.apache\.cassandra\.metrics\.client\.(\w+)
           target_label: __name__
           replacement: mcac_client_${1}
         #BufferPool Metrics
         - source_labels: ["mcac"]
           regex: org\.apache\.cassandra\.metrics\.buffer_pool\.(\w+)
           target_label: __name__
           replacement: mcac_buffer_pool_${1}
         #Index Metrics
         - source_labels: ["mcac"]
           regex: org\.apache\.cassandra\.metrics\.index\.(\w+)
           target_label: __name__
           replacement: mcac_sstable_index_${1}
         #HintService Metrics
         - source_labels: ["mcac"]
           regex: org\.apache\.cassandra\.metrics\.hinted_hand_off_manager\.([^\-]+)-(\w+)
           target_label: peer_ip
           replacement: ${2}
         - source_labels: ["mcac"]
           regex: org\.apache\.cassandra\.metrics\.hinted_hand_off_manager\.([^\-]+)-(\w+)
           target_label: __name__
           replacement: mcac_hints_${1}
         #HintService Metrics
         - source_labels: ["mcac"]
           regex: org\.apache\.cassandra\.metrics\.hints_service\.hints_delays\-(\w+)
           target_label: peer_ip
           replacement: ${1}
         - source_labels: ["mcac"]
           regex: org\.apache\.cassandra\.metrics\.hints_service\.hints_delays\-(\w+)
           target_label: __name__
           replacement: mcac_hints_hints_delays
         - source_labels: ["mcac"]
           regex: org\.apache\.cassandra\.metrics\.hints_service\.([^\-]+)
           target_label: __name__
           replacement: mcac_hints_${1}
         # Misc
         - source_labels: ["mcac"]
           regex: org\.apache\.cassandra\.metrics\.memtable_pool\.(\w+)
           target_label: __name__
           replacement: mcac_memtable_pool_${1}
         - source_labels: ["mcac"]
           regex: com\.datastax\.bdp\.type\.performance_objects\.name\.cql_slow_log\.metrics\.queries_latency
           target_label: __name__
           replacement: mcac_cql_slow_log_query_latency
         - source_labels: ["mcac"]
           regex: org\.apache\.cassandra\.metrics\.read_coordination\.(.*)
           target_label: read_type
           replacement: $1
         - source_labels: ["mcac"]
           regex: org\.apache\.cassandra\.metrics\.read_coordination\.(.*)
           target_label: __name__
           replacement: mcac_read_coordination_requests
         #GC Metrics
         - source_labels: ["mcac"]
           regex: jvm\.gc\.(\w+)\.(\w+)
           target_label: collector_type
           replacement: ${1}
         - source_labels: ["mcac"]
           regex: jvm\.gc\.(\w+)\.(\w+)
           target_label: __name__
           replacement: mcac_jvm_gc_${2}
         #JVM Metrics
         - source_labels: ["mcac"]
           regex: jvm\.memory\.(\w+)\.(\w+)
           target_label: memory_type
           replacement: ${1}
         - source_labels: ["mcac"]
           regex: jvm\.memory\.(\w+)\.(\w+)
           target_label: __name__
           replacement: mcac_jvm_memory_${2}
         - source_labels: ["mcac"]
           regex: jvm\.memory\.pools\.(\w+)\.(\w+)
           target_label: pool_name
           replacement: ${2}
         - source_labels: ["mcac"]
           regex: jvm\.memory\.pools\.(\w+)\.(\w+)
           target_label: __name__
           replacement: mcac_jvm_memory_pool_${2}
         - source_labels: ["mcac"]
           regex: jvm\.fd\.usage
           target_label: __name__
           replacement: mcac_jvm_fd_usage
         - source_labels: ["mcac"]
           regex: jvm\.buffers\.(\w+)\.(\w+)
           target_label: buffer_type
           replacement: ${1}
         - source_labels: ["mcac"]
           regex: jvm\.buffers\.(\w+)\.(\w+)
           target_label: __name__
           replacement: mcac_jvm_buffer_${2}
         #Append the prom types back to formatted names
         - source_labels: [__name__, "prom_name"]
           regex: (mcac_.*);.*(_micros_bucket|_bucket|_micros_count_total|_count_total|_total|_micros_sum|_sum|_stddev).*
           separator: ;
           target_label: __name__
           replacement: ${1}${2}
         - regex: prom_name
           action: labeldrop

      # PostgreSQL (Bitnami demo: primary + replicas) via postgres_exporter
      # Labels release + kubernetes_namespace match Grafana postgres-database.json template variables.
      - job_name: "postgres_pgdemo"
        scrape_interval: 15s
        scrape_timeout: 10s
        metrics_path: /metrics
        scheme: http
        static_configs:
          - targets:
              - postgres-exporter-primary:9187
            labels:
              pg_cluster: pgdemo
              pg_role: primary
              release: demo-hub
              kubernetes_namespace: demo-hub
          - targets:
              - postgres-exporter-replica-1:9187
            labels:
              pg_cluster: pgdemo
              pg_role: replica_1
              release: demo-hub
              kubernetes_namespace: demo-hub
          - targets:
              - postgres-exporter-replica-2:9187
            labels:
              pg_cluster: pgdemo
              pg_role: replica_2
              release: demo-hub
              kubernetes_namespace: demo-hub

      # Kafka (danielqsj/kafka-exporter; broker PLAINTEXT kafka:29092). Hostname = compose service kafka-exporter-mcac.
      - job_name: "kafka_pgdemo"
        scrape_interval: 15s
        scrape_timeout: 10s
        metrics_path: /metrics
        scheme: http
        static_configs:
          - targets:
              - kafka-exporter-mcac:9308
            labels:
              kafka_cluster: pgdemo

      # Redis 7 (oliver006/redis_exporter; password via compose REDIS_PASSWORD)
      - job_name: "redis_demo"
        scrape_interval: 15s
        scrape_timeout: 10s
        metrics_path: /metrics
        scheme: http
        static_configs:
          - targets:
              - redis-exporter:9121
            labels:
              redis_cluster: demo

      # OpenSearch (prometheuscommunity/elasticsearch-exporter; HTTP to opensearch:9200, security off in demo)
      - job_name: "opensearch_demo"
        scrape_interval: 30s
        scrape_timeout: 25s
        metrics_path: /metrics
        scheme: http
        static_configs:
          - targets:
              - opensearch-exporter:9114
            labels:
              os_cluster: demo
---

apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-tg-mcac
  namespace: demo-hub
  labels:
    demo-hub.io/group: observability
data:
  tg_mcac.json: |
    [
      {
        "targets": [
          "cassandra-0.cassandra-headless.demo-hub.svc.cluster.local:9103",
          "cassandra-1.cassandra-headless.demo-hub.svc.cluster.local:9103",
          "cassandra-2.cassandra-headless.demo-hub.svc.cluster.local:9103"
        ],
        "labels": {}
      }
    ]
---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: demo-hub
  labels:
    demo-hub.io/group: observability
    app.kubernetes.io/name: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  template:
    metadata:
      labels:
        app.kubernetes.io/name: prometheus
        demo-hub.io/group: observability
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.17.1
          imagePullPolicy: IfNotPresent
          args:
            - --config.file=/etc/prometheus/prometheus.yaml
            - --storage.tsdb.path=/prometheus
          volumeMounts:
            - name: cfg
              mountPath: /etc/prometheus/prometheus.yaml
              subPath: prometheus.yaml
            - name: tg
              mountPath: /etc/prometheus/tg_mcac.json
              subPath: tg_mcac.json
            - name: data
              mountPath: /prometheus
          ports:
            - containerPort: 9090
              name: http
      volumes:
        - name: cfg
          configMap:
            name: prometheus-config
        - name: tg
          configMap:
            name: prometheus-tg-mcac
        - name: data
          emptyDir: {}
---

apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: demo-hub
  labels:
    app.kubernetes.io/name: prometheus
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: prometheus
  ports:
    - port: 9090
      targetPort: 9090
      name: http
---

apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: demo-hub
  labels:
    demo-hub.io/group: observability
    app.kubernetes.io/part-of: demo-hub
data:
  prometheus-datasource.yaml: |
    apiVersion: 1
    
    # Demo-hub: Prometheus (metrics) + OpenSearch (logs / index exploration in Grafana).
    # Compose/K8s: OpenSearch URL is the in-network service http://opensearch:9200 (security off).
    datasources:
      - name: prometheus
        uid: prometheus
        type: prometheus
        url: http://prometheus:9090
        access: proxy
        editable: true
        isDefault: true
    
      - name: OpenSearch
        uid: opensearch
        type: grafana-opensearch-datasource
        access: proxy
        url: http://opensearch:9200
        editable: true
        isDefault: false
        jsonData:
          flavor: opensearch
          version: "2.11.0"
          timeField: "@timestamp"
          # Index pattern for Explore / logs; use hub-* for hub-orders + hub-workload, or * for all
          database: "*"
          maxConcurrentShardRequests: 5
---

apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: demo-hub
  labels:
    demo-hub.io/group: observability
    app.kubernetes.io/part-of: demo-hub
data:
  dashboards.yaml: |
    apiVersion: 1
    
    providers:
      - name: 'default'
        orgId: 1
        type: file
        editable: true
        options:
          path: /var/lib/grafana/dashboards
---

