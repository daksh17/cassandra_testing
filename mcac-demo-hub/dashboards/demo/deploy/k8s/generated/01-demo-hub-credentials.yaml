apiVersion: v1
kind: Secret
metadata:
  name: demo-hub-credentials
  namespace: demo-hub
  labels:
    app.kubernetes.io/part-of: demo-hub
    demo-hub.io/group: credentials
type: Opaque
stringData:
  postgresql-password: postgres
  postgresql-replication-password: replicatorpass
  redis-password: demoredispass
  demo-user-password: demopass
  hub-postgres-dsn: postgresql://demo:demopass@postgresql-primary:5432/demo
  hub-postgres-admin-dsn: postgresql://postgres:postgres@postgresql-primary:5432/postgres
  hub-postgres-replica-read-dsn: postgresql://demo:demopass@postgresql-replica-1:5432/demo_logical_pub
  hub-postgres-logical-sub-dsn: postgresql://demo:demopass@postgres-sub:5432/demo
  hub-postgres-logical-sub-admin-dsn: postgresql://postgres:postgres@postgres-sub:5432/postgres
  hub-redis-url: redis://:demoredispass@redis:6379/0
  mssql-sa-password: Demo_hub_Mssql_2025!
  oracle-sys-password: Demo_hub_Oracle_2025!
  oracle-demo-password: demopass
