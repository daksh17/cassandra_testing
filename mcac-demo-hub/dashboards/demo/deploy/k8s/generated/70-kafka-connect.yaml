apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-connect
  namespace: demo-hub
  labels:
    app.kubernetes.io/name: kafka-connect
    app.kubernetes.io/part-of: demo-hub
    demo-hub.io/group: kafka-connect
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kafka-connect
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kafka-connect
        app.kubernetes.io/part-of: demo-hub
        demo-hub.io/group: kafka-connect
    spec:
      containers:
        - name: kafka-connect
          image: mcac-demo/kafka-connect:2.7.3-mongo-sink
          imagePullPolicy: IfNotPresent
          env:
            - name: BOOTSTRAP_SERVERS
              value: "kafka:9092"
            - name: GROUP_ID
              value: "pgdemo-connect-cluster"
            - name: CONFIG_STORAGE_TOPIC
              value: "pgdemo_connect_configs"
            - name: OFFSET_STORAGE_TOPIC
              value: "pgdemo_connect_offsets"
            - name: STATUS_STORAGE_TOPIC
              value: "pgdemo_connect_statuses"
            - name: KEY_CONVERTER
              value: "org.apache.kafka.connect.json.JsonConverter"
            - name: VALUE_CONVERTER
              value: "org.apache.kafka.connect.json.JsonConverter"
            - name: KAFKA_HEAP_OPTS
              value: "-Xms512m -Xmx8192m"
          resources:
            requests:
              memory: "1Gi"
            limits:
              memory: "10Gi"
          ports:
            - containerPort: 8083
              name: http
---

apiVersion: v1
kind: Service
metadata:
  name: kafka-connect
  namespace: demo-hub
  labels:
    app.kubernetes.io/name: kafka-connect
    app.kubernetes.io/part-of: demo-hub
    demo-hub.io/group: kafka-connect
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: kafka-connect
  ports:
    - port: 8083
      targetPort: 8083
      name: http
