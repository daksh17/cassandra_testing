apiVersion: apps/v1
kind: Deployment
metadata:
  name: mssql-publisher
  namespace: demo-hub
  labels:
    app.kubernetes.io/name: mssql-publisher
    app.kubernetes.io/part-of: demo-hub
    demo-hub.io/group: mssql
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mssql-publisher
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mssql-publisher
        app.kubernetes.io/part-of: demo-hub
        demo-hub.io/group: mssql
    spec:
      securityContext:
        fsGroup: 10001
      containers:
        - name: mssql-publisher
          image: mcr.microsoft.com/mssql/server:2022-CU14-ubuntu-22.04
          imagePullPolicy: IfNotPresent
          env:
            - name: ACCEPT_EULA
              value: "Y"
            - name: MSSQL_PID
              value: "Developer"
            - name: MSSQL_AGENT_ENABLED
              value: "true"
            - name: MSSQL_SA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: demo-hub-credentials
                  key: mssql-sa-password
          resources:
            requests:
              memory: "2Gi"
            limits:
              memory: "4Gi"
          volumeMounts:
            - name: data
              mountPath: /var/opt/mssql
          ports:
            - containerPort: 1433
              name: mssql
          readinessProbe:
            tcpSocket:
              port: 1433
            initialDelaySeconds: 45
            periodSeconds: 8
            timeoutSeconds: 3
            failureThreshold: 30
      volumes:
        - name: data
          emptyDir: {}
---

apiVersion: v1
kind: Service
metadata:
  name: mssql-publisher
  namespace: demo-hub
  labels:
    app.kubernetes.io/name: mssql-publisher
    app.kubernetes.io/part-of: demo-hub
    demo-hub.io/group: mssql
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: mssql-publisher
  ports:
    - port: 1433
      targetPort: 1433
      name: mssql
---

