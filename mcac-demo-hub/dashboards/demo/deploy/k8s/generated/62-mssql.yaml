apiVersion: apps/v1
kind: Deployment
metadata:
  name: mssql-exporter-publisher
  namespace: demo-hub
  labels:
    app.kubernetes.io/name: mssql-exporter-publisher
    app.kubernetes.io/part-of: demo-hub
    demo-hub.io/group: mssql
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: mssql-exporter-publisher
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mssql-exporter-publisher
        app.kubernetes.io/part-of: demo-hub
        demo-hub.io/group: mssql
    spec:
      initContainers:
        - name: wait-mssql
          image: alpine:3.19
          command:
            - /bin/sh
            - -c
            - |
              apk add --no-cache netcat-openbsd >/dev/null
              for i in $(seq 1 150); do
                if nc -z -w 2 mssql-publisher.demo-hub.svc.cluster.local 1433 2>/dev/null; then exit 0; fi
                sleep 2
              done
              echo "timeout waiting for mssql-publisher.demo-hub.svc.cluster.local:1433" >&2
              exit 1
      containers:
        - name: mssql-exporter-publisher
          image: awaragi/prometheus-mssql-exporter:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: SERVER
              value: "mssql-publisher"
            - name: PORT
              value: "1433"
            - name: USERNAME
              value: "sa"
            - name: ENCRYPT
              value: "true"
            - name: TRUST_SERVER_CERTIFICATE
              value: "true"
            - name: PASSWORD
              valueFrom:
                secretKeyRef:
                  name: demo-hub-credentials
                  key: mssql-sa-password
          ports:
            - containerPort: 4000
              name: metrics
---

apiVersion: v1
kind: Service
metadata:
