# Demo-hub connectivity profile (ora2pg). Demo credentials only.
#
# Oracle: uses TNS alias DEMO_ORACLE (see /etc/oracle/network/admin/tnsnames.ora).
#   Requires Oracle Instant Client + perl DBD::Oracle in the pod (see README).
# Postgres: PG_DSN — not tnsnames; same target as psql / scenario_catalog_mirror.
#
# Quick tests (inside demo-tools pod):
#   demo-ora2pg-check
#   ora2pg -t SHOW_VERSION -c /etc/ora2pg/ora2pg.conf
#   ora2pg -t SHOW_TABLE -c /etc/ora2pg/ora2pg.conf

ORACLE_HOME	/opt/oracle/dbhome

PG_VERSION	16

# TNS alias (preferred when TNS_ADMIN is set)
ORACLE_DSN	dbi:Oracle:DEMO_ORACLE
# Easy-connect equivalent (no tnsnames):
# ORACLE_DSN	dbi:Oracle:host=oracle;port=1521;service_name=FREEPDB1

ORACLE_USER	demo
ORACLE_PWD	demopass

PG_DSN		dbi:Pg:dbname=demo;host=postgresql-primary;port=5432
PG_USER		demo
PG_PWD		demopass

# Default export schema on Oracle side (hub scenario + demo objects)
SCHEMA		DEMO

# Connectivity / inventory only (no migration output)
TYPE		TABLE
ALLOW		scenario_catalog_mirror_oracle,hub_workload_oracle,hub_demo_items

LOG_ON		1
