# dashboards/demo — single compose file for Cassandra, Kafka/ZK/Connect, Postgres, Mongo sharded,
# Prometheus, Grafana, exporters. Per-area docs (same directory):
#   cassandra/README.md · kafka/README.md · observability/README.md
#   postgres-kafka/README.md · mongo-kafka/README.md · mongo-sharded/README.md
# Index: README.md
services:
  prometheus:
    image: "prom/prometheus:v2.17.1"
    container_name: prometheus-mcac
    restart: unless-stopped
    ports:
      - "9090:9090"
    networks:
      - demo_net
    volumes:
      - "../prometheus/prometheus.yaml:/etc/prometheus/prometheus.yml"
      - "../demo/tg_mcac.json:/etc/prometheus/tg_mcac.json"
  grafana:
    image: "grafana/grafana:11.4.0"
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - "../grafana/prometheus-datasource.yaml:/etc/grafana/provisioning/datasources/prometheus-datasource.yaml"
      - "../grafana/dashboards.yaml:/etc/grafana/provisioning/dashboards/dashboards.yaml"
      - "../grafana/generated-dashboards:/var/lib/grafana/dashboards:ro"
      - "../grafana/grafana.ini:/etc/grafana/grafana.ini:ro"
    networks:
      - demo_net
    environment:
      - "GF_INSTALL_PLUGINS=grafana-polystat-panel"
      - "GF_AUTH_ANONYMOUS_ENABLED=true"
      - "GF_AUTH_ANONYMOUS_ORG_ROLE=Admin"
  mcac:
    build: ../../
    platform: linux/amd64
    volumes:
      - "mcac_data:/mcac"

  nodetool-exporter:
    build: ./nodetool-exporter
    platform: linux/amd64
    ports:
      - "9104:9104"
    environment:
      - CASSANDRA_HOSTS=cassandra,cassandra2,cassandra3,cassandra4,cassandra5
      - NODETOOL_EXPORTER_PORT=9104
    networks:
      - demo_net
    depends_on:
      cassandra2:
        condition: service_healthy

  # MongoDB exporter for local standalone/replica on port 27017.
  mongodb-exporter-local:
    image: percona/mongodb_exporter:0.40
    restart: unless-stopped
    ports:
      - "9217:9216"
    environment:
      - MONGODB_URI=mongodb://host.docker.internal:27017
    command: ["--collect-all", "--compatible-mode"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - demo_net

  # Cassandra with MCAC agent: agent is enabled via JVM_EXTRA_OPTS (official image
  # merges this into JVM). What metrics the agent collects is in ../../config/
  # (metric-collector.yaml, collectd.conf.tmpl). For a non-Docker install you would
  # add the -javaagent line to cassandra-env.sh instead (see project README).
  cassandra:
    image: cassandra:4.0
    platform: linux/amd64
    ports:
      - "9501:9501"
      - "19442:9042"
      - "7000"
      - "9103"
    volumes:
      - "mcac_data:/mcac"
      - "../../config:/mcac/config:ro"
    environment:
      MAX_HEAP_SIZE: "500M"
      HEAP_NEWSIZE: "100M"
      LOCAL_JMX: "no"
      JVM_EXTRA_OPTS: '-javaagent:/mcac/lib/datastax-mcac-agent-${PROJECT_VERSION}.jar -Dcassandra.consistent.rangemovement=false -Dcassandra.ring_delay_ms=100 -Dcassandra.jmx.remote.authenticate=false -Dcom.sun.management.jmxremote.authenticate=false -Dcom.sun.management.jmxremote.ssl=false'
      CASSANDRA_NUM_TOKENS: 8
      CASSANDRA_SEEDS: "cassandra, cassandra2"
    healthcheck:
      test: ["CMD", "cqlsh"]
      interval: 5s
      timeout: 10s
      retries: 60
    networks:
      - demo_net

  cassandra2:
    image: cassandra:4.0
    platform: linux/amd64
    ports:
      - "9501"
      - "19443:9042"
      - "7000"
      - "9103"
    volumes:
      - "mcac_data:/mcac"
      - "../../config:/mcac/config:ro"
    networks:
      - demo_net
    healthcheck:
      test: ["CMD", "cqlsh"]
      interval: 5s
      timeout: 10s
      retries: 60
    environment:
      MAX_HEAP_SIZE: "500M"
      HEAP_NEWSIZE: "100M"
      LOCAL_JMX: "no"
      JVM_EXTRA_OPTS: '-javaagent:/mcac/lib/datastax-mcac-agent-${PROJECT_VERSION}.jar -Dcassandra.consistent.rangemovement=false -Dcassandra.ring_delay_ms=100 -Dcassandra.jmx.remote.authenticate=false -Dcom.sun.management.jmxremote.authenticate=false -Dcom.sun.management.jmxremote.ssl=false'
      CASSANDRA_NUM_TOKENS: 8
      CASSANDRA_SEEDS: "cassandra2, cassandra"
    depends_on:
      cassandra:
        condition: service_healthy

  cassandra3:
    image: cassandra:4.0
    platform: linux/amd64
    ports:
      - "9501"
      - "19444:9042"
      - "7000"
      - "9103"
    volumes:
      - "mcac_data:/mcac"
      - "../../config:/mcac/config:ro"
    networks:
      - demo_net
    healthcheck:
      test: ["CMD", "cqlsh"]
      interval: 5s
      timeout: 10s
      retries: 60
    environment:
      MAX_HEAP_SIZE: "500M"
      HEAP_NEWSIZE: "100M"
      LOCAL_JMX: "no"
      JVM_EXTRA_OPTS: '-javaagent:/mcac/lib/datastax-mcac-agent-${PROJECT_VERSION}.jar -Dcassandra.consistent.rangemovement=false -Dcassandra.ring_delay_ms=100 -Dcassandra.jmx.remote.authenticate=false -Dcom.sun.management.jmxremote.authenticate=false -Dcom.sun.management.jmxremote.ssl=false'
      CASSANDRA_NUM_TOKENS: 8
      CASSANDRA_SEEDS: "cassandra, cassandra2"
    depends_on:
      cassandra2:
        condition: service_healthy

  cassandra4:
    image: cassandra:4.0
    platform: linux/amd64
    ports:
      - "9501"
      - "19445:9042"
      - "7000"
      - "9103"
    volumes:
      - "mcac_data:/mcac"
      - "../../config:/mcac/config:ro"
    networks:
      - demo_net
    healthcheck:
      test: ["CMD", "cqlsh"]
      interval: 5s
      timeout: 10s
      retries: 60
    environment:
      MAX_HEAP_SIZE: "500M"
      HEAP_NEWSIZE: "100M"
      LOCAL_JMX: "no"
      JVM_EXTRA_OPTS: '-javaagent:/mcac/lib/datastax-mcac-agent-${PROJECT_VERSION}.jar -Dcassandra.consistent.rangemovement=false -Dcassandra.ring_delay_ms=100 -Dcassandra.jmx.remote.authenticate=false -Dcom.sun.management.jmxremote.authenticate=false -Dcom.sun.management.jmxremote.ssl=false'
      CASSANDRA_NUM_TOKENS: 8
      CASSANDRA_SEEDS: "cassandra, cassandra2"
    depends_on:
      cassandra3:
        condition: service_healthy

  # Node 5: set auto_bootstrap true to stream data from the ring, or false to join without streaming.
  # With CASSANDRA_NUM_TOKENS: 8, tokens are auto-allocated (no initial_token needed).
  cassandra5:
    image: cassandra:4.0
    platform: linux/amd64
    ports:
      - "9501"
      - "19446:9042"
      - "7000"
      - "9103"
    volumes:
      - "mcac_data:/mcac"
      - "../../config:/mcac/config:ro"
    networks:
      - demo_net
    healthcheck:
      test: ["CMD", "cqlsh"]
      interval: 5s
      timeout: 10s
      retries: 60
    environment:
      MAX_HEAP_SIZE: "500M"
      HEAP_NEWSIZE: "100M"
      LOCAL_JMX: "no"
      JVM_EXTRA_OPTS: '-javaagent:/mcac/lib/datastax-mcac-agent-${PROJECT_VERSION}.jar -Dcassandra.consistent.rangemovement=false -Dcassandra.ring_delay_ms=100 -Dcassandra.jmx.remote.authenticate=false -Dcom.sun.management.jmxremote.authenticate=false -Dcom.sun.management.jmxremote.ssl=false -Dcassandra.auto_bootstrap=true'
      CASSANDRA_NUM_TOKENS: 8
      CASSANDRA_SEEDS: "cassandra, cassandra2"
    depends_on:
      cassandra4:
        condition: service_healthy

  # Standalone cluster: single node (not part of the 5-node "Test Cluster"). Cluster name "Standalone".
  cassandra-standalone:
    image: cassandra:4.0
    platform: linux/amd64
    ports:
      - "19447:9042"
      - "7000"
      - "9103"
    volumes:
      - "mcac_data:/mcac"
      - "../../config:/mcac/config:ro"
    networks:
      - demo_net
    healthcheck:
      test: ["CMD", "cqlsh"]
      interval: 5s
      timeout: 10s
      retries: 60
    environment:
      MAX_HEAP_SIZE: "500M"
      HEAP_NEWSIZE: "100M"
      LOCAL_JMX: "no"
      JVM_EXTRA_OPTS: '-javaagent:/mcac/lib/datastax-mcac-agent-${PROJECT_VERSION}.jar -Dcassandra.consistent.rangemovement=false -Dcassandra.ring_delay_ms=100 -Dcassandra.jmx.remote.authenticate=false -Dcom.sun.management.jmxremote.authenticate=false -Dcom.sun.management.jmxremote.ssl=false -Dcassandra.incremental_backups=true'
      CASSANDRA_NUM_TOKENS: 8
      CASSANDRA_CLUSTER_NAME: "Standalone"
      CASSANDRA_SEEDS: "cassandra-standalone"

  # Secondary cluster: 3-node cluster, cluster name "Secondary". DC=datacenter2, rack=rack2.
  # Uses GossipingPropertyFileSnitch + secondary-rackdc.properties. Service names: dc2r2-node1/2/3.
  dc2r2-node1:
    image: cassandra:4.0
    platform: linux/amd64
    ports:
      - "19450:9042"
      - "7000"
      - "9103"
    volumes:
      - "mcac_data:/mcac"
      - "../../config:/mcac/config:ro"
      - "./secondary-rackdc.properties:/etc/cassandra/cassandra-rackdc.properties"
      - "./dc2r2-node1.yaml:/etc/cassandra/cassandra.yaml"
    networks:
      - demo_net
    healthcheck:
      test: ["CMD", "cqlsh", "-u", "cassandra", "-p", "cassandra", "-e", "DESCRIBE CLUSTER"]
      interval: 5s
      timeout: 10s
      retries: 60
    environment:
      MAX_HEAP_SIZE: "500M"
      HEAP_NEWSIZE: "100M"
      LOCAL_JMX: "no"
      CASSANDRA_AUTHENTICATOR: "PasswordAuthenticator"
      CASSANDRA_AUTHORIZER: "CassandraAuthorizer"
      JVM_EXTRA_OPTS: '-javaagent:/mcac/lib/datastax-mcac-agent-${PROJECT_VERSION}.jar -Dcassandra.consistent.rangemovement=false -Dcassandra.ring_delay_ms=100 -Dcassandra.jmx.remote.authenticate=false -Dcom.sun.management.jmxremote.authenticate=false -Dcom.sun.management.jmxremote.ssl=false -Dcassandra.endpoint_snitch=org.apache.cassandra.locator.GossipingPropertyFileSnitch -Dcassandra.ignore_dc=true -Dcassandra.ignore_rack=true'
      CASSANDRA_NUM_TOKENS: 8
      CASSANDRA_CLUSTER_NAME: "Secondary"
      CASSANDRA_SEEDS: "dc2r2-node1,dc2r2-node2,dc2r2-node3"
      CASSANDRA_ENDPOINT_SNITCH: "org.apache.cassandra.locator.GossipingPropertyFileSnitch"

  # Secondary cluster node 2
  dc2r2-node2:
    image: cassandra:4.0
    platform: linux/amd64
    ports:
      - "19451:9042"
      - "7000"
      - "9103"
    volumes:
      - "mcac_data:/mcac"
      - "../../config:/mcac/config:ro"
      - "./secondary-rackdc.properties:/etc/cassandra/cassandra-rackdc.properties"
      - "./dc2r2-node2.yaml:/etc/cassandra/cassandra.yaml"
    networks:
      - demo_net
    healthcheck:
      test: ["CMD", "cqlsh", "-u", "cassandra", "-p", "cassandra", "-e", "DESCRIBE CLUSTER"]
      interval: 5s
      timeout: 10s
      retries: 60
    environment:
      MAX_HEAP_SIZE: "500M"
      HEAP_NEWSIZE: "100M"
      LOCAL_JMX: "no"
      CASSANDRA_AUTHENTICATOR: "PasswordAuthenticator"
      CASSANDRA_AUTHORIZER: "CassandraAuthorizer"
      JVM_EXTRA_OPTS: '-javaagent:/mcac/lib/datastax-mcac-agent-${PROJECT_VERSION}.jar -Dcassandra.consistent.rangemovement=false -Dcassandra.ring_delay_ms=100 -Dcassandra.jmx.remote.authenticate=false -Dcom.sun.management.jmxremote.authenticate=false -Dcom.sun.management.jmxremote.ssl=false -Dcassandra.endpoint_snitch=org.apache.cassandra.locator.GossipingPropertyFileSnitch -Dcassandra.ignore_dc=true -Dcassandra.ignore_rack=true'
      CASSANDRA_NUM_TOKENS: 8
      CASSANDRA_CLUSTER_NAME: "Secondary"
      CASSANDRA_SEEDS: "dc2r2-node1,dc2r2-node2"
      CASSANDRA_ENDPOINT_SNITCH: "org.apache.cassandra.locator.GossipingPropertyFileSnitch"
    depends_on:
      dc2r2-node1:
        condition: service_healthy

  dc2r2-node3:
    image: cassandra:4.0
    platform: linux/amd64
    ports:
      - "19452:9042"
      - "7000"
      - "9103"
    volumes:
      - "mcac_data:/mcac"
      - "../../config:/mcac/config:ro"
      - "./secondary-rackdc.properties:/etc/cassandra/cassandra-rackdc.properties"
      - "./dc2r2-node3.yaml:/etc/cassandra/cassandra.yaml"
    networks:
      - demo_net
    healthcheck:
      test: ["CMD", "cqlsh", "-u", "cassandra", "-p", "cassandra", "-e", "DESCRIBE CLUSTER"]
      interval: 5s
      timeout: 10s
      retries: 60
    environment:
      MAX_HEAP_SIZE: "500M"
      HEAP_NEWSIZE: "100M"
      LOCAL_JMX: "no"
      CASSANDRA_AUTHENTICATOR: "PasswordAuthenticator"
      CASSANDRA_AUTHORIZER: "CassandraAuthorizer"
      JVM_EXTRA_OPTS: '-javaagent:/mcac/lib/datastax-mcac-agent-${PROJECT_VERSION}.jar -Dcassandra.consistent.rangemovement=false -Dcassandra.ring_delay_ms=100 -Dcassandra.jmx.remote.authenticate=false -Dcom.sun.management.jmxremote.authenticate=false -Dcom.sun.management.jmxremote.ssl=false -Dcassandra.endpoint_snitch=org.apache.cassandra.locator.GossipingPropertyFileSnitch -Dcassandra.ignore_dc=true -Dcassandra.ignore_rack=true'
      CASSANDRA_NUM_TOKENS: 8
      CASSANDRA_CLUSTER_NAME: "Secondary"
      CASSANDRA_SEEDS: "dc2r2-node1,dc2r2-node2"
      CASSANDRA_ENDPOINT_SNITCH: "org.apache.cassandra.locator.GossipingPropertyFileSnitch"
    depends_on:
      dc2r2-node2:
        condition: service_healthy

  # dc2r2-node4: standalone (datacenter1/rack2) by default. To join Secondary cluster (datacenter2/rack2),
  # set CASSANDRA_CLUSTER_NAME: "Secondary", CASSANDRA_SEEDS: "dc2r2-node1,dc2r2-node2",
  # CASSANDRA_DC: "datacenter2", CASSANDRA_RACK: "rack2", mount secondary-rackdc.properties, then stop/rm/up (clear data).
  dc2r2-node4:
    image: cassandra:4.0
    platform: linux/amd64
    ports:
      - "19453:9042"
      - "7000"
      - "9103"
    volumes:
      - "mcac_data:/mcac"
      - "../../config:/mcac/config:ro"
      - "./secondary-rackdc.properties:/etc/cassandra/cassandra-rackdc.properties"
      - "./dc2r2-node4.yaml:/etc/cassandra/cassandra.yaml"
    networks:
      - demo_net
    healthcheck:
      test: ["CMD", "cqlsh", "-u", "cassandra", "-p", "cassandra", "-e", "DESCRIBE CLUSTER"]
      interval: 5s
      timeout: 10s
      retries: 60
    environment:
      MAX_HEAP_SIZE: "500M"
      HEAP_NEWSIZE: "100M"
      LOCAL_JMX: "no"
      CASSANDRA_AUTHENTICATOR: "PasswordAuthenticator"
      CASSANDRA_AUTHORIZER: "CassandraAuthorizer"
      JVM_EXTRA_OPTS: '-javaagent:/mcac/lib/datastax-mcac-agent-${PROJECT_VERSION}.jar -Dcassandra.consistent.rangemovement=false -Dcassandra.ring_delay_ms=100 -Dcassandra.jmx.remote.authenticate=false -Dcom.sun.management.jmxremote.authenticate=false -Dcom.sun.management.jmxremote.ssl=false'
      CASSANDRA_NUM_TOKENS: 8
      CASSANDRA_CLUSTER_NAME: "Secondary"
      CASSANDRA_SEEDS: "dc2r2-node1,dc2r2-node2"
      CASSANDRA_DC: "datacenter2"
      CASSANDRA_RACK: "rack2"
      CASSANDRA_ENDPOINT_SNITCH: "org.apache.cassandra.locator.GossipingPropertyFileSnitch"

  # Standalone node in datacenter1/rack1; can be joined to Secondary cluster later (see README).
  # Mounting a cassandra.yaml with auto_bootstrap: false so the node joins without streaming
  # (JVM -Dcassandra.auto_bootstrap=false is not always applied by the image).
  # If node was down and fails with "address already exists", add -Dcassandra.replace_address_first_boot=192.168.97.10
  # and -Dcassandra.allow_unsafe_replace=true (required when replacing without bootstrap). Remove both after node is back up.
  dc1-node1:
    image: cassandra:4.0
    platform: linux/amd64
    ports:
      - "19454:9042"
      - "7000"
      - "9103"
    volumes:
      - "mcac_data:/mcac"
      - "../../config:/mcac/config:ro"
      - "./secondary-rackdc.properties:/etc/cassandra/cassandra-rackdc.properties"
      # Use a yaml that has auto_bootstrap: false; entrypoint still overwrites seeds, cluster_name, etc.
      - "./dc1-node1.yaml:/etc/cassandra/cassandra.yaml"
    networks:
      - demo_net
    healthcheck:
      test: ["CMD", "cqlsh", "-u", "cassandra", "-p", "cassandra", "-e", "DESCRIBE CLUSTER"]
      interval: 5s
      timeout: 10s
      retries: 60
    environment:
      MAX_HEAP_SIZE: "500M"
      HEAP_NEWSIZE: "100M"
      LOCAL_JMX: "no"
      CASSANDRA_AUTHENTICATOR: "PasswordAuthenticator"
      CASSANDRA_AUTHORIZER: "CassandraAuthorizer"
      JVM_EXTRA_OPTS: '-javaagent:/mcac/lib/datastax-mcac-agent-${PROJECT_VERSION}.jar -Dcassandra.consistent.rangemovement=false -Dcassandra.ring_delay_ms=100 -Dcassandra.jmx.remote.authenticate=false -Dcom.sun.management.jmxremote.authenticate=false -Dcom.sun.management.jmxremote.ssl=false -Dcassandra.auto_bootstrap=false'
      CASSANDRA_NUM_TOKENS: 8
      CASSANDRA_CLUSTER_NAME: "Secondary"
      CASSANDRA_SEEDS: "dc2r2-node1,dc2r2-node2"
      CASSANDRA_DC: "datacenter2"
      CASSANDRA_RACK: "rack2"
      CASSANDRA_ENDPOINT_SNITCH: "org.apache.cassandra.locator.GossipingPropertyFileSnitch"

  stress:
    image: thelastpickle/tlp-stress:latest
    platform: linux/amd64
    ports:
      - "9500:9500"
    networks:
      - demo_net
    environment:
      - "TLP_STRESS_CASSANDRA_HOST=cassandra"
    command: "run KeyValue --rate 30 -d 1d -r .8"
    depends_on:
      cassandra2:
        condition: service_healthy

  stress2:
    image: thelastpickle/tlp-stress:latest
    platform: linux/amd64
    ports:
      - "9500"
    networks:
      - demo_net
    environment:
      - "TLP_STRESS_CASSANDRA_HOST=cassandra"
    command: "run BasicTimeSeries --rate 20 -d 1d -r .9"
    depends_on:
      cassandra2:
        condition: service_healthy

  # --- PostgreSQL 1 primary + 2 replicas (Bitnami), Kafka + ZooKeeper, Debezium Connect ---
  # CQL/users: DB demo, app user demo/demopass, replication replicator/replicatorpass, CDC debezium/debezium
  # Host CQL: 15432 primary, 15433 replica-1, 15434 replica-2 | Kafka localhost:9092 | Connect REST localhost:8083
  # kafka-connect image: build ./mongo-kafka (Debezium 2.7 + Mongo sink). Postgres: postgres-kafka/register-connectors.sh | Mongo: mongo-kafka/register-mongo-connectors.sh
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - demo_net

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server kafka:29092 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 40s
    networks:
      - demo_net

  postgresql-primary:
    # Bitnami frequently removes dated tags; use :latest or pin by digest in production.
    image: docker.io/bitnami/postgresql:latest
    restart: unless-stopped
    ports:
      - "15432:5432"
    environment:
      POSTGRESQL_REPLICATION_MODE: master
      POSTGRESQL_REPLICATION_USER: replicator
      POSTGRESQL_REPLICATION_PASSWORD: replicatorpass
      POSTGRESQL_USERNAME: demo
      POSTGRESQL_PASSWORD: demopass
      POSTGRESQL_DATABASE: demo
      POSTGRESQL_EXTRA_FLAGS: "-c wal_level=logical -c max_replication_slots=8 -c max_wal_senders=8"
    volumes:
      - postgres_primary_data:/bitnami/postgresql
      - "./postgres-kafka/01-init-debezium.sql:/docker-entrypoint-initdb.d/01-init-debezium.sql:ro"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo -d demo -h 127.0.0.1 -p 5432"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - demo_net

  postgresql-replica-1:
    image: docker.io/bitnami/postgresql:latest
    restart: unless-stopped
    ports:
      - "15433:5432"
    environment:
      POSTGRESQL_REPLICATION_MODE: slave
      POSTGRESQL_REPLICATION_USER: replicator
      POSTGRESQL_REPLICATION_PASSWORD: replicatorpass
      POSTGRESQL_MASTER_HOST: postgresql-primary
      POSTGRESQL_MASTER_PORT_NUMBER: "5432"
      POSTGRESQL_USERNAME: demo
      POSTGRESQL_PASSWORD: demopass
    volumes:
      - postgres_replica1_data:/bitnami/postgresql
    depends_on:
      postgresql-primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo -d demo -h 127.0.0.1 -p 5432"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 60s
    networks:
      - demo_net

  postgresql-replica-2:
    image: docker.io/bitnami/postgresql:latest
    restart: unless-stopped
    ports:
      - "15434:5432"
    environment:
      POSTGRESQL_REPLICATION_MODE: slave
      POSTGRESQL_REPLICATION_USER: replicator
      POSTGRESQL_REPLICATION_PASSWORD: replicatorpass
      POSTGRESQL_MASTER_HOST: postgresql-primary
      POSTGRESQL_MASTER_PORT_NUMBER: "5432"
      POSTGRESQL_USERNAME: demo
      POSTGRESQL_PASSWORD: demopass
    volumes:
      - postgres_replica2_data:/bitnami/postgresql
    depends_on:
      postgresql-primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo -d demo -h 127.0.0.1 -p 5432"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 60s
    networks:
      - demo_net

  kafka-connect:
    build:
      context: ./mongo-kafka
      dockerfile: Dockerfile.connect
    image: mcac-demo/kafka-connect:2.7.3-mongo-sink
    restart: unless-stopped
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      GROUP_ID: pgdemo-connect-cluster
      CONFIG_STORAGE_TOPIC: pgdemo_connect_configs
      OFFSET_STORAGE_TOPIC: pgdemo_connect_offsets
      STATUS_STORAGE_TOPIC: pgdemo_connect_statuses
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
    depends_on:
      kafka:
        condition: service_healthy
      postgresql-primary:
        condition: service_healthy
    networks:
      - demo_net

  postgres-exporter-primary:
    image: prometheuscommunity/postgres-exporter:v0.17.1
    restart: unless-stopped
    environment:
      # v0.17+: URI is host:port/db only; user/pass are separate (full URL here breaks scraping).
      DATA_SOURCE_URI: "postgresql-primary:5432/demo?sslmode=disable"
      DATA_SOURCE_USER: demo
      DATA_SOURCE_PASS: demopass
    networks:
      - demo_net
    depends_on:
      postgresql-primary:
        condition: service_healthy

  postgres-exporter-replica-1:
    image: prometheuscommunity/postgres-exporter:v0.17.1
    restart: unless-stopped
    environment:
      DATA_SOURCE_URI: "postgresql-replica-1:5432/demo?sslmode=disable"
      DATA_SOURCE_USER: demo
      DATA_SOURCE_PASS: demopass
    networks:
      - demo_net
    depends_on:
      postgresql-replica-1:
        condition: service_healthy

  postgres-exporter-replica-2:
    image: prometheuscommunity/postgres-exporter:v0.17.1
    restart: unless-stopped
    environment:
      DATA_SOURCE_URI: "postgresql-replica-2:5432/demo?sslmode=disable"
      DATA_SOURCE_USER: demo
      DATA_SOURCE_PASS: demopass
    networks:
      - demo_net
    depends_on:
      postgresql-replica-2:
        condition: service_healthy

  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.7.0
    restart: unless-stopped
    command:
      - "--kafka.server=kafka:29092"
    ports:
      - "9308:9308"
    networks:
      - demo_net
    depends_on:
      kafka:
        condition: service_healthy

  # --- MongoDB sharded cluster (9 containers): 3 configsvr + 3 shard RS (tic,tac,toe) + 3 mongos ---
  mongo-config1:
    image: mongo:7.0
    command: ["mongod", "--port", "27017", "--configsvr", "--replSet", "configReplSet", "--bind_ip_all"]
    volumes:
      - mongo_cfg1_data:/data/db
    networks:
      - demo_net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand({ ping: 1 })"]
      interval: 5s
      timeout: 10s
      retries: 40

  mongo-config2:
    image: mongo:7.0
    command: ["mongod", "--port", "27017", "--configsvr", "--replSet", "configReplSet", "--bind_ip_all"]
    volumes:
      - mongo_cfg2_data:/data/db
    networks:
      - demo_net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand({ ping: 1 })"]
      interval: 5s
      timeout: 10s
      retries: 40

  mongo-config3:
    image: mongo:7.0
    command: ["mongod", "--port", "27017", "--configsvr", "--replSet", "configReplSet", "--bind_ip_all"]
    volumes:
      - mongo_cfg3_data:/data/db
    networks:
      - demo_net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand({ ping: 1 })"]
      interval: 5s
      timeout: 10s
      retries: 40

  mongo-shard-tic:
    image: mongo:7.0
    command: ["mongod", "--port", "27017", "--shardsvr", "--replSet", "tic", "--bind_ip_all"]
    volumes:
      - mongo_shard_tic_data:/data/db
    networks:
      - demo_net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand({ ping: 1 })"]
      interval: 5s
      timeout: 10s
      retries: 40

  mongo-shard-tac:
    image: mongo:7.0
    command: ["mongod", "--port", "27017", "--shardsvr", "--replSet", "tac", "--bind_ip_all"]
    volumes:
      - mongo_shard_tac_data:/data/db
    networks:
      - demo_net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand({ ping: 1 })"]
      interval: 5s
      timeout: 10s
      retries: 40

  mongo-shard-toe:
    image: mongo:7.0
    command: ["mongod", "--port", "27017", "--shardsvr", "--replSet", "toe", "--bind_ip_all"]
    volumes:
      - mongo_shard_toe_data:/data/db
    networks:
      - demo_net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand({ ping: 1 })"]
      interval: 5s
      timeout: 10s
      retries: 40

  mongo-shard-init-rs:
    image: mongo:7.0
    depends_on:
      mongo-config1:
        condition: service_healthy
      mongo-config2:
        condition: service_healthy
      mongo-config3:
        condition: service_healthy
      mongo-shard-tic:
        condition: service_healthy
      mongo-shard-tac:
        condition: service_healthy
      mongo-shard-toe:
        condition: service_healthy
    volumes:
      - "./mongo-sharded/init-replica-sets.sh:/init-replica-sets.sh:ro"
    entrypoint: ["bash", "/init-replica-sets.sh"]
    networks:
      - demo_net
    restart: "no"

  mongo-mongos1:
    image: mongo:7.0
    depends_on:
      mongo-shard-init-rs:
        condition: service_completed_successfully
    command:
      - mongos
      - --configdb
      - configReplSet/mongo-config1:27017,mongo-config2:27017,mongo-config3:27017
      - --bind_ip_all
    ports:
      - "27025:27017"
    networks:
      - demo_net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand({ ping: 1 })"]
      interval: 5s
      timeout: 10s
      retries: 40

  mongo-mongos2:
    image: mongo:7.0
    depends_on:
      mongo-shard-init-rs:
        condition: service_completed_successfully
    command:
      - mongos
      - --configdb
      - configReplSet/mongo-config1:27017,mongo-config2:27017,mongo-config3:27017
      - --bind_ip_all
    ports:
      - "27026:27017"
    networks:
      - demo_net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand({ ping: 1 })"]
      interval: 5s
      timeout: 10s
      retries: 40

  mongo-mongos3:
    image: mongo:7.0
    depends_on:
      mongo-shard-init-rs:
        condition: service_completed_successfully
    command:
      - mongos
      - --configdb
      - configReplSet/mongo-config1:27017,mongo-config2:27017,mongo-config3:27017
      - --bind_ip_all
    ports:
      - "27027:27017"
    networks:
      - demo_net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand({ ping: 1 })"]
      interval: 5s
      timeout: 10s
      retries: 40

  mongo-shard-add:
    image: mongo:7.0
    depends_on:
      mongo-mongos1:
        condition: service_healthy
    volumes:
      - "./mongo-sharded/add-shards.sh:/add-shards.sh:ro"
    entrypoint: ["bash", "/add-shards.sh"]
    networks:
      - demo_net
    restart: "no"

  mongodb-exporter:
    image: percona/mongodb_exporter:0.40
    restart: unless-stopped
    ports:
      - "9216:9216"
    environment:
      - MONGODB_URI=mongodb://mongo-mongos1:27017
    command: ["--collect-all", "--compatible-mode"]
    networks:
      - demo_net
    depends_on:
      mongo-shard-add:
        condition: service_completed_successfully

  # Sharded collections + seeds for Debezium Mongo source (after tic/tac/toe shards are registered).
  mongo-kafka-prepare:
    image: mongo:7.0
    depends_on:
      mongo-shard-add:
        condition: service_completed_successfully
    volumes:
      - "./mongo-kafka/prepare-demo-collections.sh:/prepare-demo-collections.sh:ro"
    entrypoint: ["bash", "/prepare-demo-collections.sh"]
    networks:
      - demo_net
    restart: "no"

networks:
  demo_net:
    name: mcac_net
    driver: bridge
volumes:
  mcac_data:
    driver: local
  postgres_primary_data:
    driver: local
  postgres_replica1_data:
    driver: local
  postgres_replica2_data:
    driver: local
  mongo_cfg1_data:
    driver: local
  mongo_cfg2_data:
    driver: local
  mongo_cfg3_data:
    driver: local
  mongo_shard_tic_data:
    driver: local
  mongo_shard_tac_data:
    driver: local
  mongo_shard_toe_data:
    driver: local
