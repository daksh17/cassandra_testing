# dashboards/demo — single compose file for Cassandra (3-node Test Cluster), Kafka/ZK/Connect, Postgres, Mongo sharded,
# Kafka Connect: one-shot kafka-connect-register runs kafka-connect-register/register-all.sh (4 connectors: PG+Mongo CDC/sinks).
# Redis 7, OpenSearch, Prometheus, Grafana, exporters. `docker compose up` starts all services (no profiles).
# Recommended first run: ./start-full-stack.sh (sets PROJECT_VERSION, builds mcac + kafka-connect + hub-demo-ui).
# Not to be confused with ../docker-compose.yaml (dashboards root) — that file is Prometheus+Grafana only.
# Per-area docs: cassandra/README.md · kafka/README.md · observability/README.md · redis/README.md ·
#   opensearch/README.md · postgres-kafka/README.md · mongo-kafka/README.md · mongo-sharded/README.md
# Index: README.md
# Default Compose project name (overridable with COMPOSE_PROJECT_NAME). Container prefix: demo-hub-<service>-N
name: demo-hub

services:
  prometheus:
    image: "prom/prometheus:v2.17.1"
    restart: unless-stopped
    ports:
      - "9090:9090"
    networks:
      - demo_net
    volumes:
      - "../prometheus/prometheus.yaml:/etc/prometheus/prometheus.yml"
      - "../demo/tg_mcac.json:/etc/prometheus/tg_mcac.json"
  grafana:
    image: "grafana/grafana:11.4.0"
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - "../grafana/prometheus-datasource.yaml:/etc/grafana/provisioning/datasources/prometheus-datasource.yaml"
      - "../grafana/dashboards.yaml:/etc/grafana/provisioning/dashboards/dashboards.yaml"
      - "../grafana/generated-dashboards:/var/lib/grafana/dashboards:ro"
      - "../grafana/grafana.ini:/etc/grafana/grafana.ini:ro"
    networks:
      - demo_net
    environment:
      - "GF_INSTALL_PLUGINS=grafana-polystat-panel"
      - "GF_AUTH_ANONYMOUS_ENABLED=true"
      - "GF_AUTH_ANONYMOUS_ORG_ROLE=Admin"
  # One-shot: copies built agent JAR into mcac_data volume then exits. All Cassandra services depend on this
  # so ${PROJECT_VERSION} resolves to a real file under /mcac/lib on first start.
  mcac:
    build: ../../
    platform: linux/amd64
    restart: "no"
    volumes:
      - "mcac_data:/mcac"

  nodetool-exporter:
    build: ./nodetool-exporter
    # Same tag as Kubernetes manifests (`gen_demo_hub_k8s.py`) so `docker compose build nodetool-exporter`
    # produces an image you can `kind load docker-image` / `minikube image load` without retagging.
    image: demo-hub/nodetool-exporter:latest
    platform: linux/amd64
    ports:
      - "9104:9104"
    environment:
      - CASSANDRA_HOSTS=cassandra,cassandra2,cassandra3
      - NODETOOL_EXPORTER_PORT=9104
    networks:
      - demo_net
    depends_on:
      cassandra2:
        condition: service_healthy

  # MongoDB exporter for local standalone/replica on port 27017.
  mongodb-exporter-local:
    image: percona/mongodb_exporter:0.40
    restart: unless-stopped
    ports:
      - "9217:9216"
    environment:
      - MONGODB_URI=mongodb://host.docker.internal:27017
    command: ["--collect-all", "--compatible-mode"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - demo_net

  # Cassandra with MCAC agent: agent is enabled via JVM_EXTRA_OPTS (official image
  # merges this into JVM). What metrics the agent collects is in ../../config/
  # (metric-collector.yaml, collectd.conf.tmpl). For a non-Docker install you would
  # add the -javaagent line to cassandra-env.sh instead (see project README).
  cassandra:
    image: cassandra:4.0
    platform: linux/amd64
    ports:
      - "9501:9501"
      - "19442:9042"
      - "7000"
      - "9103"
    volumes:
      - "mcac_data:/mcac"
      - "../../config:/mcac/config:ro"
    depends_on:
      mcac:
        condition: service_completed_successfully
    environment:
      MAX_HEAP_SIZE: "500M"
      HEAP_NEWSIZE: "100M"
      LOCAL_JMX: "no"
      JVM_EXTRA_OPTS: '-javaagent:/mcac/lib/datastax-mcac-agent-${PROJECT_VERSION}.jar -Dcassandra.consistent.rangemovement=false -Dcassandra.ring_delay_ms=100 -Dcassandra.jmx.remote.authenticate=false -Dcom.sun.management.jmxremote.authenticate=false -Dcom.sun.management.jmxremote.ssl=false'
      CASSANDRA_NUM_TOKENS: 8
      CASSANDRA_SEEDS: "cassandra, cassandra2"
    healthcheck:
      test: ["CMD", "cqlsh"]
      interval: 5s
      timeout: 10s
      retries: 60
    networks:
      - demo_net

  cassandra2:
    image: cassandra:4.0
    platform: linux/amd64
    ports:
      - "9501"
      - "19443:9042"
      - "7000"
      - "9103"
    volumes:
      - "mcac_data:/mcac"
      - "../../config:/mcac/config:ro"
    networks:
      - demo_net
    healthcheck:
      test: ["CMD", "cqlsh"]
      interval: 5s
      timeout: 10s
      retries: 60
    environment:
      MAX_HEAP_SIZE: "500M"
      HEAP_NEWSIZE: "100M"
      LOCAL_JMX: "no"
      JVM_EXTRA_OPTS: '-javaagent:/mcac/lib/datastax-mcac-agent-${PROJECT_VERSION}.jar -Dcassandra.consistent.rangemovement=false -Dcassandra.ring_delay_ms=100 -Dcassandra.jmx.remote.authenticate=false -Dcom.sun.management.jmxremote.authenticate=false -Dcom.sun.management.jmxremote.ssl=false'
      CASSANDRA_NUM_TOKENS: 8
      CASSANDRA_SEEDS: "cassandra2, cassandra"
    depends_on:
      cassandra:
        condition: service_healthy

  cassandra3:
    image: cassandra:4.0
    platform: linux/amd64
    ports:
      - "9501"
      - "19444:9042"
      - "7000"
      - "9103"
    volumes:
      - "mcac_data:/mcac"
      - "../../config:/mcac/config:ro"
    networks:
      - demo_net
    healthcheck:
      test: ["CMD", "cqlsh"]
      interval: 5s
      timeout: 10s
      retries: 60
    environment:
      MAX_HEAP_SIZE: "500M"
      HEAP_NEWSIZE: "100M"
      LOCAL_JMX: "no"
      JVM_EXTRA_OPTS: '-javaagent:/mcac/lib/datastax-mcac-agent-${PROJECT_VERSION}.jar -Dcassandra.consistent.rangemovement=false -Dcassandra.ring_delay_ms=100 -Dcassandra.jmx.remote.authenticate=false -Dcom.sun.management.jmxremote.authenticate=false -Dcom.sun.management.jmxremote.ssl=false'
      CASSANDRA_NUM_TOKENS: 8
      CASSANDRA_SEEDS: "cassandra, cassandra2"
    depends_on:
      cassandra2:
        condition: service_healthy

  stress:
    image: thelastpickle/tlp-stress:latest
    platform: linux/amd64
    ports:
      - "9500:9500"
    networks:
      - demo_net
    environment:
      - "TLP_STRESS_CASSANDRA_HOST=cassandra"
    command: "run KeyValue --rate 30 -d 1d -r .8"
    depends_on:
      cassandra2:
        condition: service_healthy

  # --- PostgreSQL 1 primary + 2 replicas (Bitnami), Kafka + ZooKeeper, Debezium Connect ---
  # Postgres: DB demo; superuser postgres/postgres; app demo/demopass; replication replicator/replicatorpass
  # Host CQL: 15432 primary, 15433 replica-1, 15434 replica-2 | Kafka localhost:9092 | Connect REST localhost:8083
  # Physical HA: primary creates slots pgdemo_phys_replica_{1,2} (init + ensure script); each replica sets primary_slot_name.
  # kafka-connect image: build ./mongo-kafka (Debezium 2.7 + Mongo sink). Postgres: postgres-kafka/register-connectors.sh | Mongo: mongo-kafka/register-mongo-connectors.sh
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - demo_net

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      # Default ~1 MiB breaks Debezium Mongo/PG source when hub Workload uses large pad/name fields.
      KAFKA_MESSAGE_MAX_BYTES: "33554432"
      KAFKA_REPLICA_FETCH_MAX_BYTES: "33554432"
      KAFKA_SOCKET_REQUEST_MAX_BYTES: "33554432"
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server kafka:29092 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 40s
    networks:
      - demo_net

  postgresql-primary:
    # Bitnami frequently removes dated tags; use :latest or pin by digest in production.
    image: docker.io/bitnami/postgresql:latest
    restart: unless-stopped
    ports:
      - "15432:5432"
    environment:
      POSTGRESQL_REPLICATION_MODE: master
      POSTGRESQL_REPLICATION_USER: replicator
      POSTGRESQL_REPLICATION_PASSWORD: replicatorpass
      POSTGRESQL_USERNAME: postgres
      POSTGRESQL_PASSWORD: postgres
      POSTGRESQL_DATABASE: demo
      # Bitnami defaults to pgaudit; add pg_stat_statements via this env (more reliable than -c shared_preload_libraries alone).
      POSTGRESQL_SHARED_PRELOAD_LIBRARIES: pgaudit,pg_stat_statements
      POSTGRESQL_EXTRA_FLAGS: >-
        -c wal_level=logical
        -c max_replication_slots=8
        -c max_wal_senders=8
        -c pg_stat_statements.max=10000
        -c pg_stat_statements.track=all
    volumes:
      - postgres_primary_data:/bitnami/postgresql
      - "./postgres-kafka/01-init-debezium.sql:/docker-entrypoint-initdb.d/01-init-debezium.sql:ro"
      - "./postgres-kafka/ensure-physical-replication-slots.sql:/tmp/ensure-physical-replication-slots.sql:ro"
      - "./postgres-kafka/02-physical-replication-slots.sh:/docker-entrypoint-initdb.d/02-physical-replication-slots.sh:ro"
      - "./postgres-kafka/03-pg-stat-statements.sh:/docker-entrypoint-initdb.d/03-pg-stat-statements.sh:ro"
      - "./postgres-kafka/04-scenario-hub-schema-indexes.sql:/docker-entrypoint-initdb.d/04-scenario-hub-schema-indexes.sql:ro"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo -d demo -h 127.0.0.1 -p 5432"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - demo_net

  postgresql-replica-1:
    image: docker.io/bitnami/postgresql:latest
    restart: unless-stopped
    ports:
      - "15433:5432"
    environment:
      POSTGRESQL_REPLICATION_MODE: slave
      POSTGRESQL_REPLICATION_USER: replicator
      POSTGRESQL_REPLICATION_PASSWORD: replicatorpass
      POSTGRESQL_MASTER_HOST: postgresql-primary
      POSTGRESQL_MASTER_PORT_NUMBER: "5432"
      POSTGRESQL_USERNAME: postgres
      POSTGRESQL_PASSWORD: postgres
      # Physical replication slot on primary (must exist before standby connects; see 02-physical-replication-slots.sh).
      POSTGRESQL_SHARED_PRELOAD_LIBRARIES: pgaudit,pg_stat_statements
      POSTGRESQL_EXTRA_FLAGS: >-
        -c primary_slot_name=pgdemo_phys_replica_1
        -c pg_stat_statements.max=10000
        -c pg_stat_statements.track=all
    volumes:
      - postgres_replica1_data:/bitnami/postgresql
    depends_on:
      postgresql-primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo -d demo -h 127.0.0.1 -p 5432"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 60s
    networks:
      - demo_net

  postgresql-replica-2:
    image: docker.io/bitnami/postgresql:latest
    restart: unless-stopped
    ports:
      - "15434:5432"
    environment:
      POSTGRESQL_REPLICATION_MODE: slave
      POSTGRESQL_REPLICATION_USER: replicator
      POSTGRESQL_REPLICATION_PASSWORD: replicatorpass
      POSTGRESQL_MASTER_HOST: postgresql-primary
      POSTGRESQL_MASTER_PORT_NUMBER: "5432"
      POSTGRESQL_USERNAME: postgres
      POSTGRESQL_PASSWORD: postgres
      POSTGRESQL_SHARED_PRELOAD_LIBRARIES: pgaudit,pg_stat_statements
      POSTGRESQL_EXTRA_FLAGS: >-
        -c primary_slot_name=pgdemo_phys_replica_2
        -c pg_stat_statements.max=10000
        -c pg_stat_statements.track=all
    volumes:
      - postgres_replica2_data:/bitnami/postgresql
    depends_on:
      postgresql-primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo -d demo -h 127.0.0.1 -p 5432"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 60s
    networks:
      - demo_net

  kafka-connect:
    build:
      context: ./mongo-kafka
      dockerfile: Dockerfile.connect
    image: mcac-demo/kafka-connect:2.7.3-mongo-sink
    restart: unless-stopped
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      GROUP_ID: pgdemo-connect-cluster
      CONFIG_STORAGE_TOPIC: pgdemo_connect_configs
      OFFSET_STORAGE_TOPIC: pgdemo_connect_offsets
      STATUS_STORAGE_TOPIC: pgdemo_connect_statuses
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      # Debezium default is -Xmx2G; Postgres + Mongo snapshots and large CDC rows share one JVM.
      KAFKA_HEAP_OPTS: "-Xms512m -Xmx8192m"
    depends_on:
      kafka:
        condition: service_healthy
      postgresql-primary:
        condition: service_healthy
    healthcheck:
      test:
        ["CMD-SHELL", "curl -fsS http://127.0.0.1:8083/connectors >/dev/null"]
      interval: 15s
      timeout: 10s
      retries: 30
      start_period: 90s
    networks:
      - demo_net

  # One-shot: registers all four demo connectors (Postgres Debezium + JDBC sink, Mongo Debezium + Mongo sink).
  # Single order / Workload write to public.demo_items and demo.demo_items → CDC topics + JDBC/Mongo sinks (see kafka-connect-register/register-all.sh).
  kafka-connect-register:
    image: alpine:3.19
    restart: "no"
    volumes:
      - .:/work:ro
    working_dir: /work
    networks:
      - demo_net
    depends_on:
      kafka-connect:
        condition: service_healthy
      kafka:
        condition: service_healthy
      postgresql-primary:
        condition: service_healthy
      mongo-kafka-prepare:
        condition: service_completed_successfully
    command:
      - /bin/sh
      - -c
      - apk add --no-cache bash curl && exec bash /work/kafka-connect-register/register-all.sh http://kafka-connect:8083

  postgres-exporter-primary:
    image: prometheuscommunity/postgres-exporter:v0.17.1
    restart: unless-stopped
    environment:
      # v0.17+: URI is host:port/db only; user/pass are separate (full URL here breaks scraping).
      DATA_SOURCE_URI: "postgresql-primary:5432/demo?sslmode=disable"
      DATA_SOURCE_USER: demo
      DATA_SOURCE_PASS: demopass
    networks:
      - demo_net
    depends_on:
      postgresql-primary:
        condition: service_healthy

  postgres-exporter-replica-1:
    image: prometheuscommunity/postgres-exporter:v0.17.1
    restart: unless-stopped
    environment:
      DATA_SOURCE_URI: "postgresql-replica-1:5432/demo?sslmode=disable"
      DATA_SOURCE_USER: demo
      DATA_SOURCE_PASS: demopass
    networks:
      - demo_net
    depends_on:
      postgresql-replica-1:
        condition: service_healthy

  postgres-exporter-replica-2:
    image: prometheuscommunity/postgres-exporter:v0.17.1
    restart: unless-stopped
    environment:
      DATA_SOURCE_URI: "postgresql-replica-2:5432/demo?sslmode=disable"
      DATA_SOURCE_USER: demo
      DATA_SOURCE_PASS: demopass
    networks:
      - demo_net
    depends_on:
      postgresql-replica-2:
        condition: service_healthy

  # Service name suffix avoids a stuck engine record on "demo-kafka-exporter-1" (uname kill/rm may fail).
  kafka-exporter-mcac:
    image: danielqsj/kafka-exporter:v1.7.0
    restart: unless-stopped
    command:
      - "--kafka.server=kafka:29092"
    ports:
      - "9308:9308"
    networks:
      - demo_net
    depends_on:
      kafka:
        condition: service_healthy

  # --- MongoDB sharded cluster (9 containers): 3 configsvr + 3 shard RS (tic,tac,toe) + 3 mongos ---
  mongo-config1:
    image: mongo:7.0
    command: ["mongod", "--port", "27017", "--configsvr", "--replSet", "configReplSet", "--bind_ip_all"]
    volumes:
      - mongo_cfg1_data:/data/db
    networks:
      - demo_net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand({ ping: 1 })"]
      interval: 5s
      timeout: 10s
      retries: 40

  mongo-config2:
    image: mongo:7.0
    command: ["mongod", "--port", "27017", "--configsvr", "--replSet", "configReplSet", "--bind_ip_all"]
    volumes:
      - mongo_cfg2_data:/data/db
    networks:
      - demo_net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand({ ping: 1 })"]
      interval: 5s
      timeout: 10s
      retries: 40

  mongo-config3:
    image: mongo:7.0
    command: ["mongod", "--port", "27017", "--configsvr", "--replSet", "configReplSet", "--bind_ip_all"]
    volumes:
      - mongo_cfg3_data:/data/db
    networks:
      - demo_net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand({ ping: 1 })"]
      interval: 5s
      timeout: 10s
      retries: 40

  # Config replica set MUST have a primary before shard mongods start (otherwise shards with
  # persisted metadata block in initandlisten while healthcheck never passes — deadlock).
  mongo-config-init-rs:
    image: mongo:7.0
    depends_on:
      mongo-config1:
        condition: service_healthy
      mongo-config2:
        condition: service_healthy
      mongo-config3:
        condition: service_healthy
    volumes:
      - "./mongo-sharded/init-config-replica-set.sh:/init-config-replica-set.sh:ro"
    entrypoint: ["bash", "/init-config-replica-set.sh"]
    networks:
      - demo_net
    restart: "no"

  mongo-shard-tic:
    image: mongo:7.0
    depends_on:
      mongo-config-init-rs:
        condition: service_completed_successfully
    command: ["mongod", "--port", "27017", "--shardsvr", "--replSet", "tic", "--bind_ip_all"]
    volumes:
      - mongo_shard_tic_data:/data/db
    networks:
      - demo_net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand({ ping: 1 })"]
      interval: 5s
      timeout: 10s
      retries: 40

  mongo-shard-tac:
    image: mongo:7.0
    depends_on:
      mongo-config-init-rs:
        condition: service_completed_successfully
    command: ["mongod", "--port", "27017", "--shardsvr", "--replSet", "tac", "--bind_ip_all"]
    volumes:
      - mongo_shard_tac_data:/data/db
    networks:
      - demo_net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand({ ping: 1 })"]
      interval: 5s
      timeout: 10s
      retries: 40

  mongo-shard-toe:
    image: mongo:7.0
    depends_on:
      mongo-config-init-rs:
        condition: service_completed_successfully
    command: ["mongod", "--port", "27017", "--shardsvr", "--replSet", "toe", "--bind_ip_all"]
    volumes:
      - mongo_shard_toe_data:/data/db
    networks:
      - demo_net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand({ ping: 1 })"]
      interval: 5s
      timeout: 10s
      retries: 40

  mongo-shard-init-rs:
    image: mongo:7.0
    depends_on:
      mongo-shard-tic:
        condition: service_healthy
      mongo-shard-tac:
        condition: service_healthy
      mongo-shard-toe:
        condition: service_healthy
    volumes:
      - "./mongo-sharded/init-shard-replica-sets.sh:/init-shard-replica-sets.sh:ro"
    entrypoint: ["bash", "/init-shard-replica-sets.sh"]
    networks:
      - demo_net
    restart: "no"

  mongo-mongos1:
    image: mongo:7.0
    depends_on:
      mongo-shard-init-rs:
        condition: service_completed_successfully
    command:
      - mongos
      - --configdb
      - configReplSet/mongo-config1:27017,mongo-config2:27017,mongo-config3:27017
      - --bind_ip_all
    ports:
      - "27025:27017"
    networks:
      - demo_net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand({ ping: 1 })"]
      interval: 5s
      timeout: 10s
      retries: 40

  mongo-mongos2:
    image: mongo:7.0
    depends_on:
      mongo-shard-init-rs:
        condition: service_completed_successfully
    command:
      - mongos
      - --configdb
      - configReplSet/mongo-config1:27017,mongo-config2:27017,mongo-config3:27017
      - --bind_ip_all
    ports:
      - "27026:27017"
    networks:
      - demo_net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand({ ping: 1 })"]
      interval: 5s
      timeout: 10s
      retries: 40

  mongo-mongos3:
    image: mongo:7.0
    depends_on:
      mongo-shard-init-rs:
        condition: service_completed_successfully
    command:
      - mongos
      - --configdb
      - configReplSet/mongo-config1:27017,mongo-config2:27017,mongo-config3:27017
      - --bind_ip_all
    ports:
      - "27027:27017"
    networks:
      - demo_net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand({ ping: 1 })"]
      interval: 5s
      timeout: 10s
      retries: 40

  mongo-shard-add:
    image: mongo:7.0
    depends_on:
      mongo-mongos1:
        condition: service_healthy
    volumes:
      - "./mongo-sharded/add-shards.sh:/add-shards.sh:ro"
    entrypoint: ["bash", "/add-shards.sh"]
    networks:
      - demo_net
    restart: "no"

  mongodb-exporter:
    image: percona/mongodb_exporter:0.40
    restart: unless-stopped
    ports:
      - "9216:9216"
    environment:
      - MONGODB_URI=mongodb://mongo-mongos1:27017
    command: ["--collect-all", "--compatible-mode"]
    networks:
      - demo_net
    depends_on:
      mongo-shard-add:
        condition: service_completed_successfully

  # Sharded collections + seeds for Debezium Mongo source (after tic/tac/toe shards are registered).
  mongo-kafka-prepare:
    image: mongo:7.0
    depends_on:
      mongo-shard-add:
        condition: service_completed_successfully
    volumes:
      - "./mongo-kafka/prepare-demo-collections.sh:/prepare-demo-collections.sh:ro"
      - "./mongo-kafka/demo-indexes.js:/demo-indexes.js:ro"
    entrypoint: ["bash", "/prepare-demo-collections.sh"]
    networks:
      - demo_net
    restart: "no"

  # --- Redis 7 (password required); see redis/README.md ---
  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: "${REDIS_PASSWORD:-demoredispass}"
    command: ["sh", "-c", "exec redis-server --appendonly yes --requirepass \"$$REDIS_PASSWORD\""]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - demo_net
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  redis-exporter:
    image: oliver006/redis_exporter:v1.62.0
    restart: unless-stopped
    environment:
      REDIS_ADDR: "redis:6379"
      REDIS_PASSWORD: "${REDIS_PASSWORD:-demoredispass}"
    ports:
      - "9121:9121"
    networks:
      - demo_net
    depends_on:
      redis:
        condition: service_healthy

  # --- OpenSearch single-node (dev: security plugin disabled); see opensearch/README.md ---
  opensearch:
    image: opensearchproject/opensearch:2.11.1
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - DISABLE_INSTALL_DEMO_CONFIG=true
      # Dev: avoid flood-stage blocks when host disk is >95% full (breaks hub-demo-ui index create).
      - cluster.routing.allocation.disk.threshold_enabled=false
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m -XX:MaxDirectMemorySize=256m"
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    networks:
      - demo_net
    healthcheck:
      test: ["CMD-SHELL", "curl -sSf http://127.0.0.1:9200 >/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 90s

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.11.1
    restart: unless-stopped
    environment:
      # Must be a quoted JSON array — unquoted ["http://..."] breaks YAML and yields Dashboards 500 + OpenSearch connection errors.
      OPENSEARCH_HOSTS: '["http://opensearch:9200"]'
      DISABLE_SECURITY_DASHBOARDS_PLUGIN: "true"
    ports:
      - "5601:5601"
    networks:
      - demo_net
    depends_on:
      opensearch:
        condition: service_healthy

  opensearch-exporter:
    image: quay.io/prometheuscommunity/elasticsearch-exporter:v1.7.0
    restart: unless-stopped
    command:
      - "--es.uri=http://opensearch:9200"
      - "--es.all"
      - "--es.indices"
      - "--es.timeout=30s"
    networks:
      - demo_net
    depends_on:
      opensearch:
        condition: service_healthy

  # Browser UI: writes one demo order to Postgres, Mongo, Redis, Cassandra, OpenSearch (see realtime-orders-search-hub/README.md).
  hub-demo-ui:
    build:
      context: ./realtime-orders-search-hub/demo-ui
      dockerfile: Dockerfile
    image: mcac-demo/hub-demo-ui:latest
    # Mount app.py so UI/API changes apply after `docker compose restart hub-demo-ui` without rebuild.
    volumes:
      - ./realtime-orders-search-hub/demo-ui/app.py:/app/app.py:ro
      - ./realtime-orders-search-hub/demo-ui/scenario.py:/app/scenario.py:ro
    restart: unless-stopped
    ports:
      - "8888:8888"
    environment:
      POSTGRES_DSN: postgresql://demo:demopass@postgresql-primary:5432/demo
      MONGO_URI: mongodb://mongo-mongos1:27017
      REDIS_URL: redis://:${REDIS_PASSWORD:-demoredispass}@redis:6379/0
      CASSANDRA_HOSTS: cassandra
      CASSANDRA_KEYSPACE: demo_hub
      OPENSEARCH_URL: http://opensearch:9200
      OPENSEARCH_INDEX: hub-orders
      KAFKA_BOOTSTRAP: kafka:29092
      # Sustain + large payload waves: many sequential BatchStatements; demo Cassandra uses 500M heap — throttle + long timeout helps avoid coordinator timeouts (code 1100).
      CASSANDRA_WORKLOAD_REQUEST_TIMEOUT_SECONDS: "300"
      CASSANDRA_WORKLOAD_INTER_BATCH_SLEEP_MS: "25"
      CASSANDRA_WORKLOAD_WRITE_RETRIES: "3"
    networks:
      - demo_net
    depends_on:
      mcac:
        condition: service_completed_successfully
      postgresql-primary:
        condition: service_healthy
      mongo-kafka-prepare:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      cassandra:
        condition: service_healthy

networks:
  demo_net:
    name: mcac_net
    driver: bridge
volumes:
  mcac_data:
    driver: local
  postgres_primary_data:
    driver: local
  postgres_replica1_data:
    driver: local
  postgres_replica2_data:
    driver: local
  mongo_cfg1_data:
    driver: local
  mongo_cfg2_data:
    driver: local
  mongo_cfg3_data:
    driver: local
  mongo_shard_tic_data:
    driver: local
  mongo_shard_tac_data:
    driver: local
  mongo_shard_toe_data:
    driver: local
  redis_data:
    driver: local
  opensearch_data:
    driver: local
