apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-exporter-primary
  namespace: demo-hub
  labels:
    app.kubernetes.io/name: postgres-exporter-primary
    app.kubernetes.io/part-of: demo-hub
    demo-hub.io/group: exporters
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres-exporter-primary
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres-exporter-primary
        app.kubernetes.io/part-of: demo-hub
        demo-hub.io/group: exporters
    spec:
      containers:
        - name: postgres-exporter-primary
          image: prometheuscommunity/postgres-exporter:v0.17.1
          imagePullPolicy: IfNotPresent
          env:
            - name: DATA_SOURCE_URI
              value: "postgresql-primary:5432/demo?sslmode=disable"
            - name: DATA_SOURCE_USER
              value: "demo"
            - name: DATA_SOURCE_PASS
              value: "demopass"
          ports:
            - containerPort: 9187
              name: metrics
---

apiVersion: v1
kind: Service
metadata:
  name: postgres-exporter-primary
  namespace: demo-hub
  labels:
    app.kubernetes.io/name: postgres-exporter-primary
    app.kubernetes.io/part-of: demo-hub
    demo-hub.io/group: exporters
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: postgres-exporter-primary
  ports:
    - port: 9187
      targetPort: 9187
      name: metrics
---

