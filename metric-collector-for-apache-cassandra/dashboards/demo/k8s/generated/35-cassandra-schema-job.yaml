apiVersion: v1
kind: ConfigMap
metadata:
  name: cassandra-schema-sql
  namespace: demo-hub
  labels:
    demo-hub.io/group: cassandra-ring
    app.kubernetes.io/part-of: demo-hub
data:
  schema.cql: |
    CREATE KEYSPACE IF NOT EXISTS demo_hub
      WITH replication = {'class': 'SimpleStrategy', 'replication_factor': 3};
    
    -- Minimal table for hub path checks (scenario may add more)
    CREATE TABLE IF NOT EXISTS demo_hub.hub_orders_placeholder (
      id uuid PRIMARY KEY,
      created_at timestamp
    );

  bootstrap.sh: |
    #!/usr/bin/env bash
    set -euo pipefail
    CQL_HOST="cassandra-0.cassandra-headless.demo-hub.svc.cluster.local"
    for i in $(seq 1 120); do
      if cqlsh "$CQL_HOST" 9042 -e "DESCRIBE KEYSPACES" >/dev/null 2>&1; then
        break
      fi
      sleep 3
    done
    exec cqlsh "$CQL_HOST" 9042 -f /scripts/schema.cql
---

apiVersion: batch/v1
kind: Job
metadata:
  name: cassandra-demo-schema
  namespace: demo-hub
  labels:
    demo-hub.io/group: cassandra-ring
    app.kubernetes.io/part-of: demo-hub
spec:
  activeDeadlineSeconds: 7200
  ttlSecondsAfterFinished: 86400
  backoffLimit: 4
  template:
    metadata:
      labels:
        demo-hub.io/group: cassandra-ring
        app.kubernetes.io/part-of: demo-hub
    spec:
      restartPolicy: Never
      containers:
        - name: run
          image: cassandra:4.0
          imagePullPolicy: IfNotPresent
          command:
            - "/bin/bash"
            - "/scripts/bootstrap.sh"
          volumeMounts:
            - name: scripts
              mountPath: /scripts
              readOnly: true
      volumes:
        - name: scripts
          configMap:
            name: cassandra-schema-sql
            defaultMode: 0755
