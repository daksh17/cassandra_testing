apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo-mongos1
  namespace: demo-hub
  labels:
    app.kubernetes.io/name: mongo-mongos1
    app.kubernetes.io/part-of: demo-hub
    demo-hub.io/group: mongo-mongos
    demo-hub.io/mongo-role: mongos
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mongo-mongos1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mongo-mongos1
        app.kubernetes.io/part-of: demo-hub
        demo-hub.io/group: mongo-mongos
        demo-hub.io/mongo-role: mongos
    spec:
      containers:
        - name: mongo-mongos1
          image: mongo:7.0
          imagePullPolicy: IfNotPresent
          command:
            - "mongos"
            - "--configdb"
            - "configReplSet/mongo-config1:27017,mongo-config2:27017,mongo-config3:27017"
            - "--bind_ip_all"
          ports:
            - containerPort: 27017
              name: mongo
---

