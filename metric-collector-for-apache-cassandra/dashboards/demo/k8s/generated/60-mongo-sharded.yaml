apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo-config1
  namespace: demo-hub
  labels:
    app.kubernetes.io/name: mongo-config1
    app.kubernetes.io/part-of: demo-hub
    demo-hub.io/group: mongo-config-servers
    demo-hub.io/mongo-role: configsvr
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mongo-config1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mongo-config1
        app.kubernetes.io/part-of: demo-hub
        demo-hub.io/group: mongo-config-servers
        demo-hub.io/mongo-role: configsvr
    spec:
      containers:
        - name: mongo-config1
          image: mongo:7.0
          imagePullPolicy: IfNotPresent
          command:
            - "mongod"
            - "--port"
            - "27017"
            - "--configsvr"
            - "--replSet"
            - "configReplSet"
            - "--bind_ip_all"
          volumeMounts:
            - name: data
              mountPath: /data/db
          ports:
            - containerPort: 27017
              name: mongo
      volumes:
        - name: data
          emptyDir: {}
---

apiVersion: v1
kind: Service
metadata:
  name: mongo-config1
  namespace: demo-hub
  labels:
    app.kubernetes.io/name: mongo-config1
    app.kubernetes.io/part-of: demo-hub
    demo-hub.io/group: mongo-config-servers
    demo-hub.io/mongo-role: configsvr
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: mongo-config1
  ports:
    - port: 27017
      targetPort: 27017
      name: mongo
---

