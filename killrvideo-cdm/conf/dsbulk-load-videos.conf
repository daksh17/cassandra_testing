# Tab-delimited CSV for videos load (avoids splitting on commas in description).
# Use: dsbulk load -f conf/dsbulk-load-videos.conf -url data/videos_dsbulk_no_tags.csv -k killrvideo -t videos -h 127.0.0.1 -port 9042
dsbulk.connector.csv.delimiter = "\t"
# Allow table columns not in the CSV (e.g. tags, solr_query) to be null
dsbulk.schema.allowMissingFields = true
